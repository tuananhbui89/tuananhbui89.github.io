<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="svgTitle svgDesc">
  <title id="svgTitle">Generic action-conditioned JEPA training</title>
  <desc id="svgDesc">A current image passes through a context encoder to a current embedding. A recorded action and the current embedding enter a predictor, which produces a predicted next embedding. The actual next image passes through a target encoder to a target embedding. The predicted and target embeddings are compared by a prediction loss. A dashed purple constraint applies to the embeddings, and a note says target-encoder and anti-collapse choices vary by JEPA variant.</desc>
  <defs>
    <style>
      .title { fill:#172033; font:700 31px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .subtitle { fill:#52606d; font:400 17px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .label { fill:#47606c; font:800 13px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; letter-spacing:1.1px; }
      .node-title { fill:#172033; font:700 20px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .node-copy { fill:#52606d; font:400 14px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .math { fill:#172033; font:700 21px Georgia,"Times New Roman",serif; }
      .small { fill:#47606c; font:700 13px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .note { fill:#694f1b; font:600 15px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .solid { fill:none; stroke:#285e61; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowSolid); }
      .constraint { fill:none; stroke:#7c3d87; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:8 7; marker-end:url(#arrowConstraint); }
      .constraint-join { fill:none; stroke:#7c3d87; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:8 7; }
      .relation { fill:none; stroke:#677783; stroke-width:2.5; stroke-linecap:round; stroke-dasharray:7 7; }
    </style>
    <marker id="arrowSolid" markerWidth="11" markerHeight="11" refX="11" refY="5.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L11 5.5 L0 11 Z" fill="#285e61"/></marker>
    <marker id="arrowConstraint" markerWidth="11" markerHeight="11" refX="11" refY="5.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L11 5.5 L0 11 Z" fill="#7c3d87"/></marker>
  </defs>
  <g id="background"><rect width="1600" height="900" fill="#fcfbf7"/></g>
  <g id="heading"><text x="58" y="68" class="title">Action-conditioned JEPA predicts the next embedding, not pixels</text><text x="58" y="101" class="subtitle">The recorded action conditions the predictor; the actual next observation supplies the latent target.</text></g>

  <g id="context-input"><rect x="70" y="220" width="220" height="112" rx="17" fill="#e6f0f7" stroke="#5b88a0" stroke-width="2.3"/><text x="94" y="250" class="label">CONTEXT OBSERVATION</text><text x="94" y="284" class="node-title">current image</text><text x="94" y="314" class="math">oₜ</text></g>
  <g id="context-encoder"><rect x="375" y="228" width="230" height="96" rx="16" fill="#edf6ee" stroke="#5b9771" stroke-width="2.4"/><text x="400" y="257" class="label">CONTEXT ENCODER</text><text x="400" y="291" class="node-title">encode oₜ</text></g>
  <g id="current-latent"><rect x="690" y="228" width="190" height="96" rx="48" fill="#e8f6f4" stroke="#258277" stroke-width="2.6"/><text x="785" y="260" class="label" text-anchor="middle">CURRENT EMBEDDING</text><text x="785" y="298" class="math" text-anchor="middle">zₜ</text></g>
  <g id="action"><rect x="690" y="425" width="190" height="94" rx="16" fill="#fff0d9" stroke="#bc7a26" stroke-width="2.4"/><text x="714" y="454" class="label">RECORDED ACTION</text><text x="714" y="490" class="math">aₜ</text></g>
  <g id="predictor"><rect x="970" y="310" width="240" height="145" rx="18" fill="#eff5f5" stroke="#285e61" stroke-width="2.8"/><text x="1090" y="343" class="label" text-anchor="middle">ACTION-CONDITIONED</text><text x="1090" y="380" class="node-title" text-anchor="middle">predictor</text><text x="1090" y="409" class="node-copy" text-anchor="middle">fψ(zₜ, aₜ)</text></g>
  <g id="prediction"><rect x="1300" y="334" width="190" height="96" rx="48" fill="#e8f6f4" stroke="#258277" stroke-width="2.6"/><text x="1395" y="366" class="label" text-anchor="middle">PREDICTED EMBEDDING</text><text x="1395" y="404" class="math" text-anchor="middle">ẑₜ₊₁</text></g>

  <g id="target-input"><rect x="70" y="570" width="220" height="112" rx="17" fill="#e6f0f7" stroke="#5b88a0" stroke-width="2.3"/><text x="94" y="600" class="label">TARGET OBSERVATION</text><text x="94" y="634" class="node-title">actual next image</text><text x="94" y="664" class="math">oₜ₊₁</text></g>
  <g id="target-encoder"><rect x="375" y="578" width="230" height="96" rx="16" fill="#edf6ee" stroke="#5b9771" stroke-width="2.4"/><text x="400" y="607" class="label">TARGET ENCODER</text><text x="400" y="641" class="node-title">encode oₜ₊₁</text></g>
  <g id="target-latent"><rect x="690" y="578" width="190" height="96" rx="48" fill="#e7effa" stroke="#577eaa" stroke-width="2.6"/><text x="785" y="610" class="label" text-anchor="middle">TARGET EMBEDDING</text><text x="785" y="648" class="math" text-anchor="middle">zₜ₊₁</text></g>
  <g id="prediction-loss"><rect x="1110" y="552" width="330" height="125" rx="19" fill="#fff8e6" stroke="#c88414" stroke-width="3.8"/><text x="1275" y="584" class="label" text-anchor="middle">MATCH PREDICTION TO TARGET</text><text x="1275" y="620" class="node-title" text-anchor="middle">prediction loss</text><text x="1275" y="651" class="math" text-anchor="middle">‖ẑₜ₊₁ − zₜ₊₁‖²</text></g>
  <g id="anti-collapse"><rect x="690" y="760" width="330" height="88" rx="16" fill="#f7edf8" stroke="#8b4b96" stroke-width="2.6"/><text x="855" y="790" class="label" text-anchor="middle">ANTI-COLLAPSE DESIGN</text><text x="855" y="822" class="node-title" text-anchor="middle">keep embeddings informative</text></g>

  <g id="connectors">
    <path class="solid" d="M290 276 H375"/><path class="solid" d="M605 276 H690"/>
    <path class="solid" d="M880 276 H925 V355 H970"/><path class="solid" d="M880 472 H925 V410 H970"/><path class="solid" d="M1210 382 H1300"/>
    <path class="solid" d="M290 626 H375"/><path class="solid" d="M605 626 H690"/><path class="solid" d="M880 626 H1040 V614 H1110"/>
    <path class="solid" d="M1395 430 V505 H1275 V552"/>
    <path class="constraint" d="M880 300 H940 V720 H855 V760"/><path class="constraint-join" d="M785 674 V720 H855"/>
    <path class="relation" d="M490 324 V578"/>
  </g>
  <g id="connector-labels"><text x="906" y="259" class="small">state</text><text x="907" y="461" class="small">action</text><text x="1355" y="495" class="small">compare</text><text x="502" y="463" class="small">target handling varies</text></g>
  <g id="note"><rect x="78" y="756" width="520" height="92" rx="14" fill="#fff7df" stroke="#d4ad52" stroke-width="1.6"/><text x="105" y="790" class="note">JEPA variants differ in target encoders</text><text x="105" y="817" class="note">and in how they prevent collapse.</text></g>
</svg>
