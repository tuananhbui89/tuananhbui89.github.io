<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 650" role="img" aria-labelledby="svgTitle svgDesc">
  <title id="svgTitle">Four complementary functions often called world models</title>
  <desc id="svgDesc">Four cards run from left to right. Spatial representation asks what is where. A simulator or data engine asks what can happen. Predictive dynamics asks what follows from an action. Planning and control asks what should I do. Dashed arrows say the functions can inform one another, and a highlighted note says progress in one function does not establish the next.</desc>
  <defs>
    <style>
      .title { fill:#172033; font:700 31px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .subtitle { fill:#52606d; font:400 17px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .label { fill:#47606c; font:800 13px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; letter-spacing:1.1px; }
      .question { fill:#172033; font:700 26px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .copy { fill:#52606d; font:400 16px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .connector-label { fill:#47606c; font:700 13px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .note { fill:#694f1b; font:600 16px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .link { fill:none; stroke:#285e61; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:9 7; marker-end:url(#arrowLink); }
    </style>
    <marker id="arrowLink" markerWidth="11" markerHeight="11" refX="11" refY="5.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L11 5.5 L0 11 Z" fill="#285e61"/></marker>
  </defs>
  <g id="background"><rect width="1600" height="650" fill="#fcfbf7"/></g>
  <g id="heading"><text x="60" y="68" class="title">World models are complementary functions, not one capability</text><text x="60" y="101" class="subtitle">The same project can combine several functions, but each makes a different promise and has a different failure test.</text></g>

  <g id="spatial-representation">
    <rect x="60" y="210" width="300" height="220" rx="22" fill="#e6f0f7" stroke="#5b88a0" stroke-width="2.5"/>
    <text x="88" y="246" class="label">SPATIAL REPRESENTATION</text><text x="88" y="300" class="question">What is where?</text><text x="88" y="338" class="copy">geometry · layout</text><text x="88" y="364" class="copy">viewpoint consistency</text>
  </g>
  <g id="simulator-data-engine">
    <rect x="435" y="210" width="300" height="220" rx="22" fill="#edf6ee" stroke="#5b9771" stroke-width="2.5"/>
    <text x="463" y="246" class="label">SIMULATOR / DATA ENGINE</text><text x="463" y="300" class="question">What can happen?</text><text x="463" y="338" class="copy">interventions · coverage</text><text x="463" y="364" class="copy">safe, repeatable tests</text>
  </g>
  <g id="predictive-dynamics">
    <rect x="810" y="210" width="300" height="220" rx="22" fill="#e8f6f4" stroke="#258277" stroke-width="2.8"/>
    <text x="838" y="246" class="label">PREDICTIVE DYNAMICS</text><text x="838" y="300" class="question">What follows?</text><text x="838" y="338" class="copy">state + action → future</text><text x="838" y="364" class="copy">learned transition model</text>
  </g>
  <g id="planning-control">
    <rect x="1185" y="210" width="300" height="220" rx="22" fill="#fff8e6" stroke="#c88414" stroke-width="3.5"/>
    <text x="1213" y="246" class="label">PLANNING &amp; CONTROL</text><text x="1213" y="300" class="question">What should I do?</text><text x="1213" y="338" class="copy">objectives · search</text><text x="1213" y="364" class="copy">action selection</text>
  </g>

  <g id="connectors">
    <path class="link" d="M360 320 H435"/><path class="link" d="M735 320 H810"/><path class="link" d="M1110 320 H1185"/>
  </g>
  <g id="connector-labels"><text x="371" y="191" class="connector-label">can inform</text><text x="746" y="191" class="connector-label">can inform</text><text x="1121" y="191" class="connector-label">can inform</text></g>
  <g id="focus-note"><rect x="325" y="500" width="950" height="76" rx="15" fill="#fff7df" stroke="#d4ad52" stroke-width="1.8"/><text x="365" y="532" class="note">Success at one function does not establish success at the next.</text><text x="365" y="558" class="note">For example, a visually coherent scene is not automatically a reliable planner.</text></g>
</svg>
