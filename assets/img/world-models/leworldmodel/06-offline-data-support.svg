<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 830" role="img" aria-labelledby="svgTitle svgDesc">
  <title id="svgTitle">Logged transitions reveal one action outcome, not counterfactual outcomes</title>
  <desc id="svgDesc">From one observed state, three action branches are shown. The recorded action leads by a solid line to the actual next observation and then to a latent training target. Two alternative actions lead by dashed lines to unknown outcomes, marked as unobserved counterfactuals with no direct training target. A highlighted note says the gap is missing support, not a binary negative label.</desc>
  <defs>
    <style>
      .title { fill:#172033; font:700 31px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .subtitle { fill:#52606d; font:400 17px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .label { fill:#47606c; font:800 13px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; letter-spacing:1.1px; }
      .node-title { fill:#172033; font:700 20px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .node-copy { fill:#52606d; font:400 14px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .math { fill:#172033; font:700 21px Georgia,"Times New Roman",serif; }
      .small { fill:#47606c; font:700 13px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .note { fill:#694f1b; font:600 15px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .observed { fill:none; stroke:#285e61; stroke-width:3.2; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowObserved); }
      .unknown { fill:none; stroke:#a66a1d; stroke-width:2.8; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:9 8; marker-end:url(#arrowUnknown); }
      .target { fill:none; stroke:#c88414; stroke-width:3.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowTarget); }
    </style>
    <marker id="arrowObserved" markerWidth="11" markerHeight="11" refX="11" refY="5.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L11 5.5 L0 11 Z" fill="#285e61"/></marker>
    <marker id="arrowUnknown" markerWidth="11" markerHeight="11" refX="11" refY="5.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L11 5.5 L0 11 Z" fill="#a66a1d"/></marker>
    <marker id="arrowTarget" markerWidth="11" markerHeight="11" refX="11" refY="5.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L11 5.5 L0 11 Z" fill="#c88414"/></marker>
  </defs>

  <g id="background"><rect width="1600" height="830" fill="#fcfbf7"/></g>
  <g id="heading">
    <text x="60" y="68" class="title">A logged transition supervises one branch of a decision tree</text>
    <text x="60" y="101" class="subtitle">Offline data reveal the outcome of the action that was taken, not the outcomes of alternatives from the same state.</text>
  </g>

  <g id="observed-state">
    <rect x="80" y="302" width="240" height="150" rx="20" fill="#e6f0f7" stroke="#5b88a0" stroke-width="2.5"/>
    <text x="110" y="338" class="label">ONE OBSERVED STATE</text>
    <text x="110" y="378" class="node-title">current observation</text>
    <text x="110" y="416" class="math">oₜ</text>
  </g>

  <g id="alternative-actions">
    <rect x="490" y="164" width="230" height="94" rx="16" fill="#fff7e7" stroke="#a66a1d" stroke-width="2.2" stroke-dasharray="8 6"/>
    <text x="515" y="194" class="label">ALTERNATIVE ACTION</text><text x="515" y="228" class="node-title">a′ₜ</text>
    <rect x="490" y="330" width="230" height="94" rx="16" fill="#e8f6f4" stroke="#258277" stroke-width="3"/>
    <text x="515" y="360" class="label">RECORDED ACTION</text><text x="515" y="394" class="node-title">aₜ</text>
    <rect x="490" y="496" width="230" height="94" rx="16" fill="#fff7e7" stroke="#a66a1d" stroke-width="2.2" stroke-dasharray="8 6"/>
    <text x="515" y="526" class="label">ALTERNATIVE ACTION</text><text x="515" y="560" class="node-title">a″ₜ</text>
  </g>

  <g id="outcomes">
    <rect x="890" y="150" width="270" height="122" rx="18" fill="#fffaf0" stroke="#a66a1d" stroke-width="2.2" stroke-dasharray="8 6"/>
    <text x="920" y="182" class="label">UNOBSERVED OUTCOME</text><text x="920" y="218" class="node-title">what would happen?</text><text x="920" y="248" class="math">?</text>
    <rect x="880" y="304" width="290" height="150" rx="20" fill="#e8f6f4" stroke="#258277" stroke-width="4"/>
    <text x="915" y="338" class="label">REALIZED FUTURE · OBSERVED</text><text x="915" y="378" class="node-title">actual next observation</text><text x="915" y="417" class="math">oₜ₊₁</text>
    <rect x="890" y="498" width="270" height="122" rx="18" fill="#fffaf0" stroke="#a66a1d" stroke-width="2.2" stroke-dasharray="8 6"/>
    <text x="920" y="530" class="label">UNOBSERVED OUTCOME</text><text x="920" y="566" class="node-title">what would happen?</text><text x="920" y="596" class="math">?</text>
  </g>

  <g id="training-target">
    <rect x="1280" y="324" width="245" height="112" rx="18" fill="#fff8e6" stroke="#c88414" stroke-width="3.5"/>
    <text x="1402" y="355" class="label" text-anchor="middle">DIRECT TRAINING TARGET</text>
    <text x="1402" y="389" class="node-title" text-anchor="middle">latent of oₜ₊₁</text>
    <text x="1402" y="417" class="math" text-anchor="middle">eθ(oₜ₊₁)</text>
  </g>

  <g id="connectors">
    <path class="unknown" d="M320 330 H400 V211 H490"/>
    <path class="observed" d="M320 377 H490"/>
    <path class="unknown" d="M320 424 H400 V543 H490"/>
    <path class="unknown" d="M720 211 H890"/>
    <path class="observed" d="M720 377 H880"/>
    <path class="unknown" d="M720 543 H890"/>
    <path class="target" d="M1170 379 H1280"/>
  </g>
  <g id="labels">
    <text x="355" y="197" class="small">not taken</text>
    <text x="362" y="363" class="small">executed</text>
    <text x="355" y="529" class="small">not taken</text>
    <text x="737" y="364" class="small">recorded trajectory</text>
    <text x="1184" y="365" class="small">embed</text>
  </g>
  <g id="focus-note">
    <rect x="310" y="690" width="980" height="76" rx="15" fill="#fff7df" stroke="#d4ad52" stroke-width="1.8"/>
    <text x="345" y="722" class="note">The missing branches are not binary “negative” labels.</text>
    <text x="345" y="750" class="note">They are counterfactual outcomes that this trajectory does not directly supervise.</text>
  </g>
</svg>
