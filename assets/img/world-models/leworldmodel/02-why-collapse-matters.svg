<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 850" role="img" aria-labelledby="svgTitle svgDesc">
  <title id="svgTitle">Why representation collapse defeats latent prediction</title>
  <desc id="svgDesc">Two-panel comparison. On the left, three different observations enter an encoder but converge to the same latent point c. A predictor outputs c and the loss is zero, though state differences have vanished. On the right, the same observations retain separate latent positions, supported by a dashed cue to preserve distinguishable states.</desc>
  <defs>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="8.3" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2a7672"/></marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8.3" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#c57b16"/></marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8.3" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3d87"/></marker>
    <style>
      .title { font: 700 37px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .subtitle { font: 400 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526070; }
      .panel-label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.6px; }
      .panel-title { font: 700 27px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .small { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526070; }
      .small-strong { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .card-label { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1px; fill: #526070; }
      .math { font: 700 24px Georgia, "Times New Roman", serif; fill: #172033; }
      .math-small { font: 700 20px Georgia, "Times New Roman", serif; fill: #172033; }
      .node { fill: #ffffff; stroke: #b7c8cc; stroke-width: 2; }
      .encoder { fill: #e8f4f1; stroke: #2a7672; stroke-width: 2.5; }
      .latent { fill: #e4f2f0; stroke: #2a7672; stroke-width: 2.5; }
      .teal-line { fill: none; stroke: #2a7672; stroke-width: 3.5; marker-end: url(#arrowTeal); }
      .amber-line { fill: none; stroke: #c57b16; stroke-width: 4.5; marker-end: url(#arrowAmber); }
      .purple-line { fill: none; stroke: #7c3d87; stroke-width: 3.5; stroke-dasharray: 10 9; marker-end: url(#arrowPurple); }
    </style>
  </defs>
  <rect width="1600" height="850" fill="#fcfbf7"/>
  <text x="800" y="63" text-anchor="middle" class="title">Why collapse makes a low prediction loss useless</text>
  <text x="800" y="98" text-anchor="middle" class="subtitle">If every input maps to the same latent vector, a predictor can simply output that vector.</text>

  <g aria-label="Degenerate collapsed representation">
    <rect x="48" y="145" width="715" height="635" rx="26" fill="#fff7f2" stroke="#dda291" stroke-width="2.5"/>
    <text x="88" y="194" class="panel-label" fill="#a54b32">DEGENERATE SOLUTION</text>
    <text x="88" y="231" class="panel-title">Different observations become one point</text>
    <rect x="88" y="285" width="154" height="78" rx="14" class="node"/>
    <circle cx="116" cy="324" r="13" fill="#61a9c5"/><path d="M143 338 L158 309 L173 338 Z" fill="#d58645"/><text x="195" y="331" text-anchor="middle" class="math-small">o¹</text>
    <rect x="88" y="395" width="154" height="78" rx="14" class="node"/>
    <rect x="103" y="410" width="27" height="27" rx="5" fill="#7b9d6d"/><path d="M145 425 h31" stroke="#9976b6" stroke-width="8" stroke-linecap="round"/><text x="195" y="441" text-anchor="middle" class="math-small">o²</text>
    <rect x="88" y="505" width="154" height="78" rx="14" class="node"/>
    <path d="M103 550 C117 519 132 519 146 550 S174 581 190 537" fill="none" stroke="#d05d65" stroke-width="7" stroke-linecap="round"/><text x="215" y="551" text-anchor="middle" class="math-small">o³</text>
    <text x="165" y="617" text-anchor="middle" class="small">distinct observations</text>
    <rect x="316" y="333" width="168" height="222" rx="18" class="encoder"/>
    <text x="400" y="387" text-anchor="middle" class="card-label">ENCODER</text><text x="400" y="430" text-anchor="middle" class="math">eθ(·)</text>
    <text x="400" y="468" text-anchor="middle" class="small">maps every input</text><text x="400" y="490" text-anchor="middle" class="small">to the same value</text>
    <path d="M242 324 H316" class="teal-line"/><path d="M242 434 H316" class="teal-line"/><path d="M242 544 H316" class="teal-line"/>
    <path d="M484 370 C535 370 532 418 592 423" class="amber-line"/><path d="M484 434 C540 434 548 434 592 434" class="amber-line"/><path d="M484 498 C535 498 532 450 592 445" class="amber-line"/>
    <text x="552" y="340" text-anchor="middle" class="small-strong" fill="#a55e12">collapse</text>
    <circle cx="646" cy="434" r="55" fill="#fff0d7" stroke="#c57b16" stroke-width="5"/><text x="646" y="442" text-anchor="middle" class="math" fill="#8a4f0d">c</text>
    <text x="646" y="520" text-anchor="middle" class="small-strong" fill="#9a5710">same embedding</text>
    <path d="M646 489 V570" class="teal-line"/>
    <rect x="504" y="574" width="285" height="148" rx="18" fill="#ffffff" stroke="#b9c9cc" stroke-width="2"/>
    <text x="646" y="611" text-anchor="middle" class="card-label">TRIVIAL PREDICTOR</text><text x="646" y="647" text-anchor="middle" class="math-small">predict c</text>
    <text x="646" y="688" text-anchor="middle" class="math-small" fill="#a54b32">‖c − c‖² = 0</text><text x="646" y="756" text-anchor="middle" class="small-strong" fill="#a54b32">no state distinctions remain</text>
  </g>

  <g aria-label="Representation with distinguishable states">
    <rect x="837" y="145" width="715" height="635" rx="26" fill="#f2faf8" stroke="#94c6bb" stroke-width="2.5"/>
    <text x="877" y="194" class="panel-label" fill="#247166">INFORMATIVE REPRESENTATION</text><text x="877" y="231" class="panel-title">Different observations stay distinguishable</text>
    <rect x="877" y="285" width="154" height="78" rx="14" class="node"/>
    <circle cx="905" cy="324" r="13" fill="#61a9c5"/><path d="M932 338 L947 309 L962 338 Z" fill="#d58645"/><text x="984" y="331" text-anchor="middle" class="math-small">o¹</text>
    <rect x="877" y="395" width="154" height="78" rx="14" class="node"/>
    <rect x="892" y="410" width="27" height="27" rx="5" fill="#7b9d6d"/><path d="M934 425 h31" stroke="#9976b6" stroke-width="8" stroke-linecap="round"/><text x="984" y="441" text-anchor="middle" class="math-small">o²</text>
    <rect x="877" y="505" width="154" height="78" rx="14" class="node"/>
    <path d="M892 550 C906 519 921 519 935 550 S963 581 979 537" fill="none" stroke="#d05d65" stroke-width="7" stroke-linecap="round"/><text x="1004" y="551" text-anchor="middle" class="math-small">o³</text>
    <text x="954" y="617" text-anchor="middle" class="small">same kinds of observations</text>
    <rect x="1105" y="333" width="168" height="222" rx="18" class="encoder"/>
    <text x="1189" y="387" text-anchor="middle" class="card-label">ENCODER</text><text x="1189" y="430" text-anchor="middle" class="math">eθ(·)</text>
    <text x="1189" y="468" text-anchor="middle" class="small">retains relevant</text><text x="1189" y="490" text-anchor="middle" class="small">state differences</text>
    <path d="M1031 324 H1105" class="teal-line"/><path d="M1031 434 H1105" class="teal-line"/><path d="M1031 544 H1105" class="teal-line"/>
    <path d="M1273 434 H1330" class="teal-line"/>
    <rect x="1332" y="279" width="168" height="300" rx="18" class="latent"/>
    <text x="1416" y="318" text-anchor="middle" class="card-label">LATENT SPACE</text>
    <circle cx="1380" cy="373" r="19" fill="#5a9ebc"/><text x="1415" y="381" class="math-small">z¹</text>
    <circle cx="1455" cy="437" r="19" fill="#7d9e6a"/><text x="1376" y="445" class="math-small">z²</text>
    <circle cx="1388" cy="508" r="19" fill="#c46c74"/><text x="1424" y="516" class="math-small">z³</text>
    <text x="1416" y="557" text-anchor="middle" class="small-strong" fill="#247166">separate embeddings</text>
    <rect x="1110" y="635" width="340" height="78" rx="18" fill="#f7eff9" stroke="#7c3d87" stroke-width="2"/>
    <text x="1280" y="668" text-anchor="middle" class="card-label" fill="#67316f">ANTI-COLLAPSE DESIGN</text><text x="1280" y="696" text-anchor="middle" class="small-strong" fill="#67316f">preserve distinguishable states</text>
    <path d="M1416 635 V579" class="purple-line"/>
  </g>
  <text x="800" y="822" text-anchor="middle" class="small">A low prediction loss is useful only when the latent target still carries distinctions needed downstream.</text>
</svg>
