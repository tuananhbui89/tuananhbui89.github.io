<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">A production agent is a controlled system, not a model alone</title>
  <desc id="desc">A task enters an agent runtime that contains a model and context selection. The runtime requests controlled tools, which can produce an external effect. A policy and approval gate governs that effect. State, traces, evaluations, and guardrails provide evidence and feedback to the runtime.</desc>
  <defs>
    <style>
      .bg { fill: #f7f7f4; }
      .panel { fill: #ffffff; stroke: #c4d5d2; stroke-width: 2; }
      .eyebrow { font: 700 17px system-ui, sans-serif; letter-spacing: 2.2px; fill: #276c77; }
      .title { font: 700 25px system-ui, sans-serif; fill: #24343a; }
      .node { font: 700 19px system-ui, sans-serif; fill: #24343a; }
      .body { font: 500 15px system-ui, sans-serif; fill: #52666b; }
      .runtime-title { font: 700 22px system-ui, sans-serif; fill: #ffffff; }
      .runtime-body { font: 500 15px system-ui, sans-serif; fill: #d7efed; }
      .gate-title { font: 700 17px system-ui, sans-serif; fill: #765c20; }
      .gate-body { font: 600 14px system-ui, sans-serif; fill: #765c20; }
      .evidence { font: 600 16px system-ui, sans-serif; fill: #276c77; }
      .legend { font: 500 13px system-ui, sans-serif; fill: #52666b; }
    </style>
    <marker id="work-arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 1L11 6L0 11z" fill="#4d747a"/>
    </marker>
    <marker id="evidence-arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 1L11 6L0 11z" fill="#83aaa5"/>
    </marker>
    <marker id="gate-arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 1L11 6L0 11z" fill="#d3a94a"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="700" rx="28"/>
  <rect class="panel" x="54" y="52" width="1092" height="596" rx="28"/>
  <text class="eyebrow" x="100" y="108">A MODEL IS NOT THE SYSTEM</text>
  <text class="title" x="100" y="145">Production autonomy needs explicit boundaries around every external effect.</text>

  <rect class="panel" x="96" y="282" width="170" height="116" rx="20"/>
  <text class="node" x="181" y="326" text-anchor="middle">Task / trigger</text>
  <text class="body" x="181" y="355" text-anchor="middle">goal, requester,</text>
  <text class="body" x="181" y="378" text-anchor="middle">success criteria</text>

  <rect x="360" y="247" width="286" height="186" rx="24" fill="#276c77"/>
  <text class="runtime-title" x="503" y="297" text-anchor="middle">Agent runtime</text>
  <text class="runtime-body" x="503" y="329" text-anchor="middle">model proposes next step</text>
  <text class="runtime-body" x="503" y="355" text-anchor="middle">context selects allowed facts</text>
  <rect x="405" y="378" width="196" height="30" rx="15" fill="#4d868e"/>
  <text x="503" y="399" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">does not own permissions</text>

  <rect class="panel" x="741" y="282" width="184" height="116" rx="20"/>
  <text class="node" x="833" y="326" text-anchor="middle">Controlled tools</text>
  <text class="body" x="833" y="355" text-anchor="middle">typed actions, scopes,</text>
  <text class="body" x="833" y="378" text-anchor="middle">validation, errors</text>

  <rect class="panel" x="968" y="282" width="132" height="116" rx="20"/>
  <text class="node" x="1034" y="326" text-anchor="middle">External</text>
  <text class="node" x="1034" y="349" text-anchor="middle">effect</text>
  <text class="body" x="1034" y="378" text-anchor="middle">artifact or action</text>

  <path d="M266 340H360" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#work-arrow)"/>
  <path d="M646 340H741" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#work-arrow)"/>
  <path d="M925 340H968" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#work-arrow)"/>
  <text class="legend" x="311" y="322" text-anchor="middle">work request</text>
  <text class="legend" x="694" y="322" text-anchor="middle">tool call</text>

  <rect x="909" y="186" width="191" height="62" rx="17" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/>
  <text class="gate-title" x="1005" y="214" text-anchor="middle">Policy + approval</text>
  <text class="gate-body" x="1005" y="236" text-anchor="middle">allow, pause, or block</text>
  <path d="M1005 248V282" fill="none" stroke="#d3a94a" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#gate-arrow)"/>

  <rect x="278" y="505" width="620" height="72" rx="20" fill="#e4f1f2" stroke="#83aaa5" stroke-width="2"/>
  <text class="evidence" x="588" y="535" text-anchor="middle">Evidence control plane</text>
  <text class="body" x="588" y="559" text-anchor="middle">persisted state · traces · evaluations · guardrails · recovery signals</text>
  <path d="M833 398V505" fill="none" stroke="#83aaa5" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#evidence-arrow)"/>
  <path d="M588 505V469H503V433" fill="none" stroke="#83aaa5" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#evidence-arrow)"/>
  <text class="legend" x="871" y="456" text-anchor="middle">records evidence</text>
  <text class="legend" x="650" y="488" text-anchor="middle">feedback</text>
</svg>
