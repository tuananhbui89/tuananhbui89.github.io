<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Why practical agent systems became more feasible</title>
  <desc id="desc">Four capabilities converge on a practical agent system: capable models, tool-ready runtimes, reusable implementation patterns, and interoperable connections. A note explains that convergence does not remove the need for guardrails, evaluation, or approval.</desc>
  <defs>
    <style>
      .bg { fill: #f7f7f4; }
      .panel { fill: #ffffff; stroke: #c4d5d2; stroke-width: 2; }
      .eyebrow { font: 700 17px system-ui, sans-serif; letter-spacing: 2.2px; fill: #276c77; }
      .title { font: 700 25px system-ui, sans-serif; fill: #24343a; }
      .card-title { font: 700 20px system-ui, sans-serif; fill: #24343a; }
      .body { font: 500 15px system-ui, sans-serif; fill: #52666b; }
      .center-title { font: 700 24px system-ui, sans-serif; fill: #ffffff; }
      .center-body { font: 500 15px system-ui, sans-serif; fill: #d7efed; }
      .note { font: 600 15px system-ui, sans-serif; fill: #765c20; }
    </style>
    <marker id="support-arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 1L11 6L0 11z" fill="#4d747a"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="700" rx="28"/>
  <rect class="panel" x="54" y="52" width="1092" height="596" rx="28"/>
  <text class="eyebrow" x="100" y="108">WHY AGENTS, WHY NOW</text>
  <text class="title" x="100" y="145">Practical agent systems emerged from a convergence, not one breakthrough.</text>

  <g>
    <rect class="panel" x="100" y="194" width="252" height="126" rx="20"/>
    <text class="card-title" x="126" y="233">Capable models</text>
    <text class="body" x="126" y="264">interpret complex input</text>
    <text class="body" x="126" y="287">and plan through feedback</text>
  </g>
  <g>
    <rect class="panel" x="100" y="360" width="252" height="126" rx="20"/>
    <text class="card-title" x="126" y="399">Tool-ready runtimes</text>
    <text class="body" x="126" y="430">connect search, files, and</text>
    <text class="body" x="126" y="453">actions with traceability</text>
  </g>
  <g>
    <rect class="panel" x="848" y="194" width="252" height="126" rx="20"/>
    <text class="card-title" x="874" y="233">Reusable patterns</text>
    <text class="body" x="874" y="264">make workflows, loops, and</text>
    <text class="body" x="874" y="287">recovery easier to design</text>
  </g>
  <g>
    <rect class="panel" x="848" y="360" width="252" height="126" rx="20"/>
    <text class="card-title" x="874" y="399">Connected systems</text>
    <text class="body" x="874" y="430">standardize access to tools,</text>
    <text class="body" x="874" y="453">context, and other agents</text>
  </g>

  <path d="M352 257H450" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#support-arrow)"/>
  <path d="M352 423H450" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#support-arrow)"/>
  <path d="M848 257H750" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#support-arrow)"/>
  <path d="M848 423H750" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#support-arrow)"/>

  <rect x="450" y="242" width="300" height="196" rx="26" fill="#276c77"/>
  <text class="center-title" x="600" y="303" text-anchor="middle">Practical agent</text>
  <text class="center-title" x="600" y="332" text-anchor="middle">system</text>
  <text class="center-body" x="600" y="370" text-anchor="middle">goal + tools + state</text>
  <text class="center-body" x="600" y="394" text-anchor="middle">+ feedback loop</text>

  <rect x="176" y="538" width="848" height="62" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/>
  <text class="note" x="600" y="576" text-anchor="middle">This makes agents more feasible; guardrails, evaluation, and approval still determine whether they are deployable.</text>
</svg>
