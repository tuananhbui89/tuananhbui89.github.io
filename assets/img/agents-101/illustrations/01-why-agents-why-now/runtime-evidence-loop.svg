<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc"><title id="title">An agent earns autonomy through an evidence loop</title><desc id="desc">A goal becomes a proposed action, a verified result, and updated state. Evidence determines whether work repeats, stops, or escalates.</desc><defs><style>.b{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.h{font:700 23px system-ui;fill:#24343a}.k{font:700 17px system-ui;letter-spacing:2px;fill:#276c77}.n{font:700 18px system-ui;fill:#24343a}.s{font:500 14px system-ui;fill:#52666b}.w{font:700 18px system-ui;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs><rect class="b" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">AGENCY NEEDS EVIDENCE</text><text class="h" x="100" y="143">An agent earns another step only when the environment confirms useful progress.</text><rect class="p" x="120" y="270" width="180" height="100" rx="20"/><text class="n" x="210" y="312" text-anchor="middle">Goal + context</text><text class="s" x="210" y="339" text-anchor="middle">what needs doing</text><rect x="430" y="250" width="200" height="140" rx="22" fill="#276c77"/><text class="w" x="530" y="307" text-anchor="middle">Propose + act</text><text x="530" y="336" text-anchor="middle" fill="#d7efed" font-family="system-ui" font-size="14">model + tools</text><rect x="760" y="270" width="200" height="100" rx="20" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="860" y="312" text-anchor="middle">Verify evidence</text><text class="s" x="860" y="339" text-anchor="middle">tests, checks, approval</text><path d="M300 320H430" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M630 320H760" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M860 370V460H210V370" fill="none" stroke="#83aaa5" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#a)"/><text class="s" x="535" y="504" text-anchor="middle">Persist state; repeat, stop, or escalate based on evidence.</text></svg>
