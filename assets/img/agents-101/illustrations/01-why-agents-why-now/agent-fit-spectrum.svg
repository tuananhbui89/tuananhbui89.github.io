<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Choose the least autonomous system that fits the task</title>
  <desc id="desc">A spectrum moves from a deterministic function to a predefined workflow to an agent with a dynamically chosen path. The agent option is highlighted only when new observations determine the next step.</desc>
  <defs><style>.bg{fill:#f7f7f4}.panel{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2.2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.t{font:500 17px system-ui,sans-serif;fill:#5f6f7a}.card{font:700 22px system-ui,sans-serif;fill:#24343a}.small{font:500 15px system-ui,sans-serif;fill:#52666b}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="panel" x="54" y="52" width="1092" height="516" rx="28"/>
  <text class="k" x="100" y="108">CHOOSING THE RIGHT AMOUNT OF AGENCY</text><text class="h" x="100" y="143">Start simple; add model-directed work only when the path is genuinely uncertain.</text>
  <path d="M325 339H432" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/><path d="M690 339H797" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/>
  <g><rect class="panel" x="116" y="244" width="209" height="190" rx="22"/><text class="card" x="220" y="293" text-anchor="middle">Function</text><text class="small" x="220" y="327" text-anchor="middle">fixed inputs</text><text class="small" x="220" y="350" text-anchor="middle">fixed rule</text><text class="small" x="220" y="373" text-anchor="middle">fixed output</text><rect x="150" y="391" width="140" height="26" rx="13" fill="#edf2f1"/><text class="small" x="220" y="410" text-anchor="middle">predictable task</text></g>
  <g><rect class="panel" x="432" y="244" width="258" height="190" rx="22"/><text class="card" x="561" y="293" text-anchor="middle">Workflow</text><text class="small" x="561" y="327" text-anchor="middle">known sequence</text><text class="small" x="561" y="350" text-anchor="middle">code selects next step</text><text class="small" x="561" y="373" text-anchor="middle">repeatable branching</text><rect x="481" y="391" width="160" height="26" rx="13" fill="#edf2f1"/><text class="small" x="561" y="410" text-anchor="middle">path designed ahead</text></g>
  <g><rect x="797" y="228" width="286" height="222" rx="24" fill="#e4f1f2" stroke="#276c77" stroke-width="3"/><circle cx="1045" cy="263" r="10" fill="#d49d38"/><text class="card" x="940" y="293" text-anchor="middle">Agent</text><text class="small" x="940" y="327" text-anchor="middle">goal-directed work</text><text class="small" x="940" y="350" text-anchor="middle">model chooses next step</text><text class="small" x="940" y="373" text-anchor="middle">tools + state + observations</text><rect x="834" y="397" width="212" height="34" rx="17" fill="#276c77"/><text x="940" y="420" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="15" font-weight="700">path depends on discoveries</text></g>
  <text class="t" x="600" y="510" text-anchor="middle">Use an agent when flexibility is worth more than the predictability of a predefined path.</text>
</svg>
