<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">A harness turns a goal into an observable and verifiable run</title><desc id="desc">A task enters an isolated agent run with approved tools and observations. The run executes a verification step and writes a structured record containing evidence, result, and approval state.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 22px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 18px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">THE HARNESS MAKES ONE RUN LEGIBLE</text><text class="h" x="100" y="143">A goal becomes reliable work only when the run can observe, verify, and record what happened.</text>
  <rect class="p" x="100" y="275" width="190" height="100" rx="20"/><text class="n" x="195" y="317" text-anchor="middle">Task</text><text class="s" x="195" y="344" text-anchor="middle">reduce startup latency</text><path d="M290 325H390" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/>
  <rect x="390" y="204" width="330" height="248" rx="26" fill="#276c77"/><text class="w" x="555" y="252" text-anchor="middle">Isolated agent run</text><rect x="425" y="282" width="260" height="40" rx="12" fill="#dceeed"/><text class="s" x="555" y="308" text-anchor="middle">tools: shell · browser · metrics</text><rect x="425" y="339" width="260" height="40" rx="12" fill="#dceeed"/><text class="s" x="555" y="365" text-anchor="middle">evidence: traces + measurements</text><path d="M720 325H810" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/>
  <rect x="810" y="252" width="245" height="146" rx="23" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="932" y="296" text-anchor="middle">Verification</text><text class="s" x="932" y="326" text-anchor="middle">rerun workload</text><text class="s" x="932" y="350" text-anchor="middle">test threshold</text><path d="M932 398V468" fill="none" stroke="#b48931" stroke-width="3" marker-end="url(#a)"/><rect x="800" y="468" width="264" height="54" rx="16" fill="#f0f3f3" stroke="#a9b6b7" stroke-width="2"/><text class="s" x="932" y="501" text-anchor="middle">run record: evidence + result + approval</text>
</svg>
