<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Agent systems engineering expands beyond prompt engineering</title>
  <desc id="desc">Six stacked engineering surfaces expand from a prompt to context, tools, harness, loop, and evaluation plus safety. A callout says to fix the surface where the failure occurs rather than repeatedly rewriting the prompt.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.n{font:700 20px system-ui,sans-serif;fill:#24343a}.s{font:500 15px system-ui,sans-serif;fill:#52666b}.w{font:700 15px system-ui,sans-serif;fill:#fff}</style></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/>
  <text class="k" x="100" y="108">FROM A PROMPT TO A SYSTEM</text><text class="h" x="100" y="143">Reliable agent work is engineered across several surfaces.</text>
  <g><rect x="164" y="196" width="340" height="54" rx="15" fill="#eaf2f1"/><text class="n" x="194" y="230">Prompt</text><text class="s" x="350" y="230">shape one model call</text>
  <rect x="188" y="258" width="388" height="54" rx="15" fill="#dceeed"/><text class="n" x="218" y="292">Context</text><text class="s" x="387" y="292">supply current facts</text>
  <rect x="212" y="320" width="436" height="54" rx="15" fill="#cce6e2"/><text class="n" x="242" y="354">Tools</text><text class="s" x="412" y="354">make actions possible</text>
  <rect x="236" y="382" width="484" height="54" rx="15" fill="#b7dad5"/><text class="n" x="266" y="416">Harness</text><text class="s" x="450" y="416">make one run reliable</text>
  <rect x="260" y="444" width="532" height="54" rx="15" fill="#91c4bd"/><text class="n" x="290" y="478">Loop</text><text class="s" x="438" y="478">repeat, verify, and persist</text>
  <rect x="284" y="506" width="580" height="40" rx="14" fill="#276c77"/><text class="w" x="574" y="532" text-anchor="middle">EVALUATION + SAFETY measure and constrain the whole system</text></g>
  <rect x="796" y="226" width="270" height="176" rx="20" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text x="827" y="266" fill="#4b3a16" font-family="system-ui,sans-serif" font-size="19" font-weight="750">Locate the failure</text><text class="s" x="827" y="302">Missing fact? Fix context.</text><text class="s" x="827" y="329">Wrong action? Fix tools.</text><text class="s" x="827" y="356">Repeated work? Fix the loop.</text><text class="s" x="827" y="383">Do not keep tuning the prompt</text></svg>
