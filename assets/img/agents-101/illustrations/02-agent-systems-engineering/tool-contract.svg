<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">A tool contract makes actions clear, constrained, and recoverable</title><desc id="desc">A safe tool contract combines an explicit name and consequence, typed input schema, structured output or error, and a permission tier. Structured recovery information helps the model choose a safe next action.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 22px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 18px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">TOOLS ARE AGENT-COMPUTER INTERFACES</text><text class="h" x="100" y="143">Make the action, boundary, and recovery path legible before the tool is called.</text>
  <rect x="160" y="205" width="360" height="274" rx="24" fill="#e4f1f2" stroke="#77aaa5" stroke-width="3"/><text class="n" x="200" y="250">refund_order</text><text class="s" x="200" y="278">stages a refund; never moves money</text><g><rect class="p" x="190" y="306" width="300" height="40" rx="12"/><text class="s" x="210" y="332">input: order_id, reason, amount_cents</text><rect class="p" x="190" y="358" width="300" height="40" rx="12"/><text class="s" x="210" y="384">output: ok, event, structured error</text><rect x="190" y="410" width="300" height="40" rx="12" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="s" x="210" y="436">permission: approval required</text></g>
  <path d="M520 342H660" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><rect x="660" y="237" width="350" height="210" rx="24" fill="#276c77"/><text class="w" x="695" y="284">Recoverable result</text><text x="695" y="322" fill="#d7efed" font-family="system-ui,sans-serif" font-size="15">error_code: POLICY_NOT_FOUND</text><text x="695" y="352" fill="#d7efed" font-family="system-ui,sans-serif" font-size="15">recoverable: true</text><text x="695" y="382" fill="#d7efed" font-family="system-ui,sans-serif" font-size="15">next: search_policy or escalate</text>
</svg>
