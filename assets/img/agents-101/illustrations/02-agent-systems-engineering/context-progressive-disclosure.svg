<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Context engineering loads a small map before deeper evidence</title><desc id="desc">A root instruction map points to architecture, command, policy, and task documents. A selection step filters these sources by relevance, authority, freshness, and permission before putting only the needed evidence into the context window.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 22px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 18px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">CONTEXT USES PROGRESSIVE DISCLOSURE</text><text class="h" x="100" y="143">Start with a navigable map; load deeper evidence only when the task needs it.</text>
  <rect x="108" y="270" width="190" height="102" rx="20" fill="#276c77"/><text class="w" x="203" y="314" text-anchor="middle">Root guide</text><text x="203" y="340" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">AGENTS.md / index</text>
  <path d="M298 300C330 265 350 230 385 230" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><path d="M298 321H385" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><path d="M298 342C330 377 350 412 385 412" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><rect class="p" x="385" y="195" width="200" height="70" rx="17"/><rect class="p" x="385" y="286" width="200" height="70" rx="17"/><rect class="p" x="385" y="377" width="200" height="70" rx="17"/><text class="n" x="485" y="225" text-anchor="middle">Architecture docs</text><text class="n" x="485" y="316" text-anchor="middle">Command docs</text><text class="n" x="485" y="407" text-anchor="middle">Task evidence</text>
