<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Safety is enforced through layered control gates</title><desc id="desc">Untrusted input is isolated before it can influence the model. A tool request is checked against permission rules, and sensitive external effects require human approval and an audit record.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 22px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 18px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">SAFETY IS A CONTROL SYSTEM</text><text class="h" x="100" y="143">Make unsafe behaviour difficult, visible, and reviewable at every boundary.</text>
  <g><rect class="p" x="90" y="270" width="170" height="98" rx="18"/><text class="n" x="175" y="312" text-anchor="middle">Untrusted input</text><text class="s" x="175" y="338" text-anchor="middle">data, text, instructions</text><rect x="345" y="270" width="170" height="98" rx="18" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/><text class="n" x="430" y="312" text-anchor="middle">Isolate + validate</text><text class="s" x="430" y="338" text-anchor="middle">treat as data</text><rect x="600" y="270" width="170" height="98" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="685" y="312" text-anchor="middle">Permission gate</text><text class="s" x="685" y="338" text-anchor="middle">scope + tool tier</text><rect x="855" y="270" width="170" height="98" rx="18" fill="#276c77"/><text class="w" x="940" y="312" text-anchor="middle">External effect</text><text x="940" y="338" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">only when allowed</text></g>
  <path d="M260 319H345" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M515 319H600" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M770 319H855" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M685 368V449" fill="none" stroke="#b48931" stroke-width="3" marker-end="url(#a)"/><rect x="540" y="449" width="290" height="54" rx="17" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="685" y="482" text-anchor="middle">Human approval + audit</text>
</svg>
