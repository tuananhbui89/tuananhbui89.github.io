<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">A loop is a small control system for repeated verified work</title><desc id="desc">A heartbeat triggers work discovery, a maker attempts the task, a checker verifies it, and durable state decides whether to continue, stop, or escalate to a human.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 22px system-ui,sans-serif;fill:#24343a}.n{font:700 17px system-ui,sans-serif;fill:#24343a}.s{font:500 13px system-ui,sans-serif;fill:#52666b}.w{font:700 17px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">LOOPS DECIDE WHAT HAPPENS NEXT</text><text class="h" x="100" y="143">Repeated agent work needs a heartbeat, evidence, state, and explicit stop or escalation rules.</text>
  <g><rect class="p" x="92" y="264" width="170" height="100" rx="18"/><text class="n" x="177" y="306" text-anchor="middle">Heartbeat</text><text class="s" x="177" y="332" text-anchor="middle">schedule or trigger</text><rect class="p" x="325" y="264" width="170" height="100" rx="18"/><text class="n" x="410" y="306" text-anchor="middle">Work finder</text><text class="s" x="410" y="332" text-anchor="middle">CI, ticket, regression</text><rect x="558" y="264" width="170" height="100" rx="18" fill="#276c77"/><text class="w" x="643" y="306" text-anchor="middle">Maker</text><text x="643" y="332" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="13">attempts the task</text><rect x="791" y="264" width="170" height="100" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="876" y="306" text-anchor="middle">Checker</text><text class="s" x="876" y="332" text-anchor="middle">tests evidence</text></g>
  <path d="M262 314H325" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><path d="M495 314H558" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><path d="M728 314H791" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><path d="M876 364V440" fill="none" stroke="#b48931" stroke-width="3" marker-end="url(#a)"/>
  <rect x="748" y="440" width="256" height="62" rx="18" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/><text class="n" x="876" y="468" text-anchor="middle">Durable state</text><text class="s" x="876" y="490" text-anchor="middle">continue · stop · escalate</text><path d="M748 471H410V364" fill="none" stroke="#83aaa5" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#a)"/><text class="s" x="560" y="526" text-anchor="middle">Only continue when the task remains useful and controls allow it.</text>
</svg>
