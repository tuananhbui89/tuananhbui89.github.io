<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">A prompt is a control header, not a knowledge dump</title><desc id="desc">A concise prompt control header defines role, goal, success criteria, constraints, and a stop condition. Durable facts, tools, and policy remain in the surrounding system instead of being crammed into the prompt.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.n{font:700 19px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 18px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">PROMPTS DEFINE LOCAL INTENT</text><text class="h" x="100" y="143">A good prompt is an inspectable control header, not the system’s entire knowledge base.</text>
  <rect x="140" y="202" width="430" height="292" rx="24" fill="#e4f1f2" stroke="#77aaa5" stroke-width="3"/><text class="n" x="180" y="246">Control header</text><g class="s"><text x="180" y="288">role: support operations agent</text><text x="180" y="326">goal: resolve or escalate the ticket</text><text x="180" y="364">success: documented outcome</text><text x="180" y="402">constraints: approval before refunds</text><text x="180" y="440">stop: evidence written or escalation made</text></g>
  <path d="M570 348H704" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><rect x="704" y="254" width="250" height="188" rx="24" fill="#276c77" stroke="#174c55" stroke-width="2"/><text class="w" x="829" y="312" text-anchor="middle">One model turn</text><text x="829" y="344" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">intent + boundaries</text><text x="829" y="370" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">guide the next action</text>
  <rect x="705" y="470" width="250" height="48" rx="16" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="s" x="830" y="500" text-anchor="middle">Facts, tools, and policy live elsewhere.</text>
</svg>
