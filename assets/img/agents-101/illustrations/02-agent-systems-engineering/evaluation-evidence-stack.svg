<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Agent evaluation connects a scenario, trace, graders, and outcome</title><desc id="desc">An evaluation task runs an agent and produces a trace plus external outcome. Deterministic, model, and human graders inspect the relevant evidence, and findings improve the next dataset and agent version.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 22px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 18px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">EVALS MEASURE BEHAVIOUR, NOT VIBES</text><text class="h" x="100" y="143">A credible evaluation follows a scenario through the run to the evidence that matters.</text>
  <rect class="p" x="106" y="264" width="170" height="104" rx="20"/><text class="n" x="191" y="307" text-anchor="middle">Eval task</text><text class="s" x="191" y="334" text-anchor="middle">input + criteria</text><path d="M276 316H374" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/>
  <rect x="374" y="232" width="212" height="168" rx="24" fill="#276c77"/><text class="w" x="480" y="280" text-anchor="middle">Agent run</text><text x="480" y="312" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">tools · guards · retries</text><text x="480" y="338" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">trace + external outcome</text>
  <path d="M586 316H686" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><rect x="686" y="206" width="300" height="220" rx="24" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/><text class="n" x="836" y="253" text-anchor="middle">Grade the evidence</text><text class="s" x="836" y="293" text-anchor="middle">deterministic: state + tool checks</text><text class="s" x="836" y="321" text-anchor="middle">model: rubric for open-ended quality</text><text class="s" x="836" y="349" text-anchor="middle">human: calibration + judgment</text>
  <path d="M836 426V470" fill="none" stroke="#83aaa5" stroke-width="3" marker-end="url(#a)"/><rect x="696" y="470" width="280" height="54" rx="16" fill="#f0f3f3" stroke="#a9b6b7" stroke-width="2"/><text class="s" x="836" y="503" text-anchor="middle">update tasks, graders, and version</text>
</svg>
