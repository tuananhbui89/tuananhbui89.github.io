<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Agent safety is enforced at workflow boundaries</title>
  <desc id="desc">Untrusted input enters a model, which may request tools and produce output. Guardrails operate before the model, before tools, and before final output, while approvals gate external side effects.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 17px system-ui,sans-serif;fill:#fff}.guard{font:700 14px system-ui,sans-serif;fill:#7d5b15}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">SAFETY IS A SET OF BOUNDARIES</text><text class="h" x="100" y="143">Controls belong where risky data, decisions, and side effects cross the workflow.</text>
  <path d="M276 333H355" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M525 333H604" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M774 333H853" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M1023 333H1080" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/>
  <g><rect class="p" x="100" y="278" width="176" height="110" rx="18"/><text class="n" x="188" y="321" text-anchor="middle">Input</text><text class="s" x="188" y="347" text-anchor="middle">user + retrieved data</text>
  <rect x="355" y="278" width="170" height="110" rx="18" fill="#276c77" stroke="#174c55" stroke-width="2"/><text class="w" x="440" y="321" text-anchor="middle">Model</text><text x="440" y="347" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">proposes work</text>
  <rect class="p" x="604" y="278" width="170" height="110" rx="18"/><text class="n" x="689" y="321" text-anchor="middle">Tool request</text><text class="s" x="689" y="347" text-anchor="middle">arguments + scope</text>
  <rect x="853" y="278" width="170" height="110" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="938" y="321" text-anchor="middle">External action</text><text class="s" x="938" y="347" text-anchor="middle">write or side effect</text>
  <rect class="p" x="1080" y="278" width="60" height="110" rx="18"/><text class="n" x="1110" y="321" text-anchor="middle">User</text><text class="s" x="1110" y="347" text-anchor="middle">output</text></g>
  <g><rect x="112" y="211" width="152" height="38" rx="14" fill="#fff0c9" stroke="#d3a94a"/><text class="guard" x="188" y="236" text-anchor="middle">INPUT GUARDRAIL</text><rect x="616" y="211" width="146" height="38" rx="14" fill="#fff0c9" stroke="#d3a94a"/><text class="guard" x="689" y="236" text-anchor="middle">TOOL GUARDRAIL</text><rect x="1000" y="211" width="142" height="38" rx="14" fill="#fff0c9" stroke="#d3a94a"/><text class="guard" x="1071" y="236" text-anchor="middle">OUTPUT CHECK</text></g>
  <path d="M938 388V452" fill="none" stroke="#b48931" stroke-width="3" marker-end="url(#a)"/><rect x="840" y="452" width="196" height="54" rx="16" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="938" y="477" text-anchor="middle">Human approval</text><text class="s" x="938" y="497" text-anchor="middle">before side effects</text>
  <text class="s" x="470" y="529" text-anchor="middle">Treat retrieved text as data, not authority.</text>
</svg>
