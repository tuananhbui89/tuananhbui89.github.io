<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">The components that make a model into an agent system</title>
  <desc id="desc">A diagram shows a model at the centre of an agent system. Instructions, tools, state, guardrails, and a runtime loop surround it inside a system boundary. A goal and context enter from the left and verified outcomes leave on the right.</desc>
  <defs>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef5f4"/>
    </linearGradient>
    <linearGradient id="modelFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#276c77"/>
      <stop offset="1" stop-color="#174c55"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 1L11 6L0 11z" fill="#4d747a"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 1L11 6L0 11z" fill="#83aaa5"/>
    </marker>
    <pattern id="contours" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M-7 21C0 13 11 13 18 21S36 29 43 21" fill="none" stroke="#b9d8d5" stroke-width="1.5" opacity=".65"/>
      <path d="M-7 7C0-1 11-1 18 7S36 15 43 7" fill="none" stroke="#b9d8d5" stroke-width="1.5" opacity=".38"/>
    </pattern>
  </defs>
  <rect width="1200" height="720" rx="28" fill="#f7f7f4"/>
  <rect x="54" y="56" width="1092" height="562" rx="28" fill="url(#surface)" stroke="#b9ceca" stroke-width="2"/>
  <rect x="55" y="57" width="1090" height="128" rx="28" fill="url(#contours)" opacity=".5"/>
  <text x="100" y="111" fill="#276c77" font-family="system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="2.4">THE AGENT IS A SYSTEM</text>
  <text x="100" y="143" fill="#25353b" font-family="system-ui, sans-serif" font-size="27" font-weight="650">A model becomes useful when its surrounding contracts make action legible.</text>
  <rect x="961" y="76" width="141" height="38" rx="19" fill="#e4f1f2" stroke="#93bbb6"/>
  <text x="1031.5" y="101" text-anchor="middle" fill="#276c77" font-family="system-ui, sans-serif" font-size="15" font-weight="700">SYSTEM BOUNDARY</text>

  <rect x="85" y="306" width="153" height="92" rx="17" fill="#fff" stroke="#94b4b0" stroke-width="2"/>
  <text x="161.5" y="342" text-anchor="middle" fill="#1f2933" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Goal + context</text>
  <text x="161.5" y="369" text-anchor="middle" fill="#5f6f7a" font-family="system-ui, sans-serif" font-size="15">what to solve</text>

  <rect x="963" y="306" width="151" height="92" rx="17" fill="#fff" stroke="#94b4b0" stroke-width="2"/>
  <text x="1038.5" y="342" text-anchor="middle" fill="#1f2933" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Outcome</text>
  <text x="1038.5" y="369" text-anchor="middle" fill="#5f6f7a" font-family="system-ui, sans-serif" font-size="15">evidence of work</text>

  <g font-family="system-ui, sans-serif">
    <rect x="278" y="230" width="151" height="74" rx="17" fill="#fff" stroke="#94b4b0" stroke-width="2"/>
    <text x="353.5" y="260" text-anchor="middle" fill="#1f2933" font-size="18" font-weight="700">Instructions</text>
    <text x="353.5" y="284" text-anchor="middle" fill="#5f6f7a" font-size="14">role · boundaries</text>

    <rect x="772" y="230" width="151" height="74" rx="17" fill="#fff" stroke="#94b4b0" stroke-width="2"/>
    <text x="847.5" y="260" text-anchor="middle" fill="#1f2933" font-size="18" font-weight="700">Tools</text>
    <text x="847.5" y="284" text-anchor="middle" fill="#5f6f7a" font-size="14">read · act · observe</text>

    <rect x="772" y="414" width="151" height="74" rx="17" fill="#fff" stroke="#94b4b0" stroke-width="2"/>
    <text x="847.5" y="444" text-anchor="middle" fill="#1f2933" font-size="18" font-weight="700">State</text>
    <text x="847.5" y="468" text-anchor="middle" fill="#5f6f7a" font-size="14">task · memory</text>

    <rect x="278" y="414" width="151" height="74" rx="17" fill="#fff" stroke="#94b4b0" stroke-width="2"/>
    <text x="353.5" y="444" text-anchor="middle" fill="#1f2933" font-size="18" font-weight="700">Guardrails</text>
    <text x="353.5" y="468" text-anchor="middle" fill="#5f6f7a" font-size="14">validate · approve</text>
  </g>

  <circle cx="600" cy="357" r="125" fill="#dceeed" opacity=".8"/>
  <circle cx="600" cy="357" r="104" fill="url(#modelFill)" stroke="#174c55" stroke-width="3"/>
  <circle cx="600" cy="357" r="84" fill="none" stroke="#bde2df" stroke-width="2" stroke-dasharray="5 8"/>
  <text x="600" y="344" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="25" font-weight="750">Model</text>
  <text x="600" y="374" text-anchor="middle" fill="#d8f0ee" font-family="system-ui, sans-serif" font-size="16">reason · choose · generate</text>

  <rect x="438" y="512" width="324" height="79" rx="19" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/>
  <text x="600" y="544" text-anchor="middle" fill="#1f2933" font-family="system-ui, sans-serif" font-size="19" font-weight="750">Runtime loop</text>
  <text x="600" y="568" text-anchor="middle" fill="#3f666c" font-family="system-ui, sans-serif" font-size="14">coordinate · recover · stop</text>

  <g fill="none" stroke-linecap="round">
    <path d="M238 352H475" stroke="#4d747a" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M725 352H963" stroke="#4d747a" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M429 267C456 244 483 237 512 268" stroke="#83aaa5" stroke-width="3" marker-end="url(#arrowSoft)"/>
    <path d="M688 268C717 237 744 244 772 267" stroke="#83aaa5" stroke-width="3" marker-end="url(#arrowSoft)"/>
    <path d="M772 451C744 475 717 471 688 446" stroke="#83aaa5" stroke-width="3" marker-end="url(#arrowSoft)"/>
    <path d="M429 451C456 475 483 471 512 446" stroke="#83aaa5" stroke-width="3" marker-end="url(#arrowSoft)"/>
    <path d="M600 482V512" stroke="#4d747a" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <circle cx="79" cy="652" r="5" fill="#276c77"/>
  <text x="94" y="658" fill="#5f6f7a" font-family="system-ui, sans-serif" font-size="14">Arrows show information and action moving through the system; the boundary makes responsibility explicit.</text>
</svg>
