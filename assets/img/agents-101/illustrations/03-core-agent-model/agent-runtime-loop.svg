<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">A verified agent runtime loop with recovery, approval, and stop paths</title>
  <desc id="desc">A left-to-right loop prepares context, calls the model, validates a proposed action, acts and observes, then persists state. Validation can pause for approval, route recoverable errors back to preparation, or stop when objective evidence is reached or the error cannot be recovered.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#eef5f4"/>
    </linearGradient>
    <linearGradient id="loop" x1="0" x2="1">
      <stop offset="0" stop-color="#276c77"/>
      <stop offset="1" stop-color="#4c8c85"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 1L11 6L0 11z" fill="#477b7d"/>
    </marker>
    <marker id="mutedArrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 1L11 6L0 11z" fill="#87989b"/>
    </marker>
    <pattern id="grain" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.1" fill="#93bbb6" opacity=".45"/>
      <circle cx="15" cy="12" r=".8" fill="#93bbb6" opacity=".33"/>
      <circle cx="8" cy="20" r=".9" fill="#93bbb6" opacity=".25"/>
    </pattern>
  </defs>
  <rect width="1200" height="720" rx="28" fill="#f7f7f4"/>
  <rect x="54" y="56" width="1092" height="562" rx="28" fill="url(#panel)" stroke="#b9ceca" stroke-width="2"/>
  <rect x="55" y="57" width="1090" height="115" rx="28" fill="url(#grain)" opacity=".72"/>
  <text x="100" y="111" fill="#276c77" font-family="system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="2.4">THE RUN IS A VERIFIED LOOP</text>
  <text x="100" y="143" fill="#25353b" font-family="system-ui, sans-serif" font-size="24" font-weight="650">A run prepares, validates, acts, records evidence, then decides what happens next.</text>

  <g font-family="system-ui, sans-serif">
    <path d="M236 299H290" fill="none" stroke="url(#loop)" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M446 299H500" fill="none" stroke="url(#loop)" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M656 299H710" fill="none" stroke="url(#loop)" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M866 299H920" fill="none" stroke="url(#loop)" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="80" y="238" width="156" height="122" rx="20" fill="#fff" stroke="#95bbb7" stroke-width="2.5"/>
    <text x="158" y="282" text-anchor="middle" fill="#1f2933" font-size="20" font-weight="750">Prepare</text>
    <text x="158" y="313" text-anchor="middle" fill="#5f6f7a" font-size="14">instructions + state</text>
    <text x="158" y="336" text-anchor="middle" fill="#5f6f7a" font-size="14">+ current context</text>

    <rect x="290" y="238" width="156" height="122" rx="20" fill="#276c77" stroke="#174c55" stroke-width="2.5"/>
    <text x="368" y="282" text-anchor="middle" fill="#fff" font-size="20" font-weight="750">Model</text>
    <text x="368" y="313" text-anchor="middle" fill="#d7efed" font-size="14">propose an answer,</text>
    <text x="368" y="336" text-anchor="middle" fill="#d7efed" font-size="14">tool call, or handoff</text>

    <rect x="500" y="238" width="156" height="122" rx="20" fill="#fff8df" stroke="#d3a94a" stroke-width="2.5"/>
    <text x="578" y="282" text-anchor="middle" fill="#4b3a16" font-size="20" font-weight="750">Validate</text>
    <text x="578" y="313" text-anchor="middle" fill="#786331" font-size="14">guardrails + schema</text>
    <text x="578" y="336" text-anchor="middle" fill="#786331" font-size="14">+ permissions</text>

    <rect x="710" y="238" width="156" height="122" rx="20" fill="#fff" stroke="#95bbb7" stroke-width="2.5"/>
    <text x="788" y="282" text-anchor="middle" fill="#1f2933" font-size="20" font-weight="750">Act + observe</text>
    <text x="788" y="313" text-anchor="middle" fill="#5f6f7a" font-size="14">run tool or handoff;</text>
    <text x="788" y="336" text-anchor="middle" fill="#5f6f7a" font-size="14">capture evidence</text>

    <rect x="920" y="238" width="166" height="122" rx="20" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2.5"/>
    <text x="1003" y="282" text-anchor="middle" fill="#1f2933" font-size="20" font-weight="750">Persist state</text>
    <text x="1003" y="313" text-anchor="middle" fill="#3f666c" font-size="14">task status, artifacts,</text>
    <text x="1003" y="336" text-anchor="middle" fill="#3f666c" font-size="14">and observations</text>

    <path d="M1003 360V414H158V360" fill="none" stroke="#477b7d" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
    <text x="580" y="438" text-anchor="middle" fill="#477b7d" font-size="15" font-weight="700">continue with updated state until an objective stop condition is met</text>

    <path d="M578 360V454" fill="none" stroke="#b48931" stroke-width="3" marker-end="url(#mutedArrow)"/>
    <rect x="464" y="454" width="228" height="64" rx="16" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/>
    <text x="578" y="481" text-anchor="middle" fill="#4b3a16" font-size="17" font-weight="750">Approval required</text>
    <text x="578" y="504" text-anchor="middle" fill="#786331" font-size="14">pause, present evidence, resume later</text>

    <path d="M788 360V550H366" fill="none" stroke="#87989b" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#mutedArrow)"/>
    <rect x="122" y="550" width="244" height="56" rx="16" fill="#f0f3f3" stroke="#a9b6b7" stroke-width="2"/>
    <text x="244" y="575" text-anchor="middle" fill="#334448" font-size="17" font-weight="750">Recoverable error</text>
    <text x="244" y="596" text-anchor="middle" fill="#65777a" font-size="14">retrieve context, repair, or retry</text>

    <path d="M1003 360V550" fill="none" stroke="#bd6c58" stroke-width="3" marker-end="url(#mutedArrow)"/>
    <rect x="834" y="550" width="252" height="56" rx="16" fill="#fff0eb" stroke="#d99b8c" stroke-width="2"/>
    <text x="960" y="575" text-anchor="middle" fill="#763f34" font-size="17" font-weight="750">Stop with evidence</text>
    <text x="960" y="596" text-anchor="middle" fill="#8b5b51" font-size="14">objective complete, blocked, or unsafe</text>
  </g>
  <circle cx="79" cy="653" r="5" fill="#276c77"/>
  <text x="94" y="658" fill="#5f6f7a" font-family="system-ui, sans-serif" font-size="14">Validation turns a model response into a controlled workflow: approve, recover, continue, or stop.</text>
</svg>
