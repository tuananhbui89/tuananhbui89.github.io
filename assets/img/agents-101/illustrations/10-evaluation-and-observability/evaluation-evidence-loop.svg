<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Trace evidence supports three kinds of agent evaluation</title>
  <desc id="desc">A run trace records model, tool, guardrail, and handoff activity. It feeds evaluation of output, trajectory, and external outcome, whose findings update datasets, graders, and the next version of the agent.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 21px system-ui,sans-serif;fill:#24343a}.n{font:700 19px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 19px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">MAKE THE RUN VISIBLE BEFORE YOU SCORE IT</text><text class="h" x="100" y="143">A final answer alone cannot show whether an agent acted safely or changed the world correctly.</text>
  <rect x="465" y="226" width="270" height="130" rx="24" fill="#276c77" stroke="#174c55" stroke-width="2"/><text class="w" x="600" y="274" text-anchor="middle">Run trace</text><text x="600" y="304" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">model · tools · guardrails · handoffs</text><text x="600" y="328" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">retries · approvals · observations</text>
  <path d="M465 290H312" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/><path d="M600 356V410" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/><path d="M735 290H888" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/>
  <g><rect class="p" x="100" y="225" width="212" height="130" rx="22"/><text class="n" x="206" y="270" text-anchor="middle">Output</text><text class="s" x="206" y="300" text-anchor="middle">Was the answer useful,</text><text class="s" x="206" y="323" text-anchor="middle">correct, and clear?</text>
  <rect x="494" y="410" width="212" height="98" rx="22" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="600" y="449" text-anchor="middle">Trajectory</text><text class="s" x="600" y="477" text-anchor="middle">Were the steps allowed?</text>
  <rect class="p" x="888" y="225" width="212" height="130" rx="22"/><text class="n" x="994" y="270" text-anchor="middle">Outcome</text><text class="s" x="994" y="300" text-anchor="middle">Did the external state</text><text class="s" x="994" y="323" text-anchor="middle">become correct?</text></g>
  <path d="M206 355V536H994V355" fill="none" stroke="#83aaa5" stroke-width="3" stroke-dasharray="8 8"/><text class="s" x="600" y="558" text-anchor="middle">Use findings to improve tasks, datasets, graders, and the next agent version.</text>
</svg>
