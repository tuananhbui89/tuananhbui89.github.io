<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Compaction reduces narrative history while durable state preserves exact facts</title>
  <desc id="desc">A long history is compacted into a concise narrative summary for the next model turn. A separate durable-state record keeps approvals, identifiers, file paths, test results, and citations exact, and only relevant facts are selected for the next turn.</desc>
  <defs>
    <style>
      .bg{fill:#f7f7f4}.panel{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2.2px;fill:#276c77}.h{font:700 24px system-ui,sans-serif;fill:#24343a}.n{font:700 19px system-ui,sans-serif;fill:#24343a}.s{font:500 15px system-ui,sans-serif;fill:#52666b}.w{font:700 20px system-ui,sans-serif;fill:#fff}.ws{font:500 15px system-ui,sans-serif;fill:#d7efed}.exact{font:700 16px system-ui,sans-serif;fill:#276c77}
    </style>
    <marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker>
    <marker id="d" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#83aaa5"/></marker>
  </defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="panel" x="54" y="52" width="1092" height="536" rx="28"/>
  <text class="k" x="100" y="108">COMPACTION WITH A DURABLE STATE BOUNDARY</text><text class="h" x="100" y="145">Shrink narrative history; do not compress facts the next run must know exactly.</text>
  <rect class="panel" x="100" y="230" width="230" height="135" rx="20"/><text class="n" x="215" y="278" text-anchor="middle">Long history</text><text class="s" x="215" y="307" text-anchor="middle">messages, observations,</text><text class="s" x="215" y="330" text-anchor="middle">reasoning, and narrative</text>
  <rect x="455" y="212" width="290" height="170" rx="24" fill="#276c77"/><text class="w" x="600" y="270" text-anchor="middle">Compaction</text><text class="ws" x="600" y="302" text-anchor="middle">keep decisions, open questions,</text><text class="ws" x="600" y="326" text-anchor="middle">and useful narrative context</text><rect x="498" y="342" width="204" height="24" rx="12" fill="#4d868e"/><text x="600" y="359" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">lossy by design</text>
  <rect class="panel" x="870" y="230" width="230" height="135" rx="20"/><text class="n" x="985" y="278" text-anchor="middle">Next model turn</text><text class="s" x="985" y="307" text-anchor="middle">compact narrative plus</text><text class="s" x="985" y="330" text-anchor="middle">selected current evidence</text>
  <path d="M330 297H455" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/><path d="M745 297H870" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/><text class="s" x="392" y="278" text-anchor="middle">compress</text><text class="s" x="807" y="278" text-anchor="middle">carry forward</text>
  <rect x="236" y="450" width="728" height="78" rx="20" fill="#e4f1f2" stroke="#83aaa5" stroke-width="2"/><text class="exact" x="600" y="481" text-anchor="middle">Durable structured state stays exact</text><text class="s" x="600" y="507" text-anchor="middle">approvals · IDs · file paths · test results · citations · audit records</text>
  <path d="M964 489H1038V365" fill="none" stroke="#83aaa5" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#d)"/><text class="s" x="1038" y="431" text-anchor="middle">select if relevant</text>
</svg>
