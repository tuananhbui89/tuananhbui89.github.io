<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Context is selected now while memory is retrieved later</title>
  <desc id="desc">Instructions, user request, retrieval, and tool observations are selected into the next model input. Durable memory can be retrieved when relevant, while sensitive, stale, and irrelevant material remains outside the context window.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 20px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 19px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">CONTEXT IS A CURATED WORKING SET</text><text class="h" x="100" y="143">Bring back only what helps this next turn; keep durable knowledge available, not always present.</text>
  <g><rect class="p" x="100" y="211" width="212" height="74" rx="16"/><text class="n" x="206" y="242" text-anchor="middle">Instructions</text><text class="s" x="206" y="266" text-anchor="middle">authority + constraints</text><rect class="p" x="100" y="303" width="212" height="74" rx="16"/><text class="n" x="206" y="334" text-anchor="middle">Current task</text><text class="s" x="206" y="358" text-anchor="middle">user goal + state</text><rect class="p" x="100" y="395" width="212" height="74" rx="16"/><text class="n" x="206" y="426" text-anchor="middle">Retrieval + tools</text><text class="s" x="206" y="450" text-anchor="middle">fresh evidence</text></g>
  <path d="M312 248H428" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><path d="M312 340H428" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><path d="M312 432H428" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/>
  <rect x="428" y="226" width="256" height="222" rx="22" fill="#e4f1f2" stroke="#77aaa5" stroke-width="3"/><text class="n" x="556" y="270" text-anchor="middle">Selection</text><text class="s" x="556" y="301" text-anchor="middle">relevance · authority · freshness</text><text class="s" x="556" y="325" text-anchor="middle">privacy · token budget</text><rect x="474" y="360" width="164" height="48" rx="15" fill="#276c77"/><text class="w" x="556" y="391" text-anchor="middle">Next model input</text>
  <path d="M684 337H770" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><rect x="770" y="254" width="245" height="166" rx="22" fill="#fff" stroke="#276c77" stroke-width="3"/><text class="n" x="893" y="297" text-anchor="middle">Context window</text><text class="s" x="893" y="327" text-anchor="middle">temporary working view</text><text class="s" x="893" y="351" text-anchor="middle">expensive and bounded</text>
  <path d="M893 420V481" fill="none" stroke="#83aaa5" stroke-width="3" marker-end="url(#a)"/><rect x="736" y="481" width="314" height="52" rx="16" fill="#f0f3f3" stroke="#a9b6b7" stroke-width="2"/><text class="n" x="893" y="514" text-anchor="middle">Keep out: stale, irrelevant, or sensitive</text>
  <path d="M1040 274C1036 292 1028 321 1015 337" fill="none" stroke="#83aaa5" stroke-width="3" marker-end="url(#a)"/><rect x="1040" y="211" width="72" height="74" rx="16" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text x="1076" y="243" text-anchor="middle" fill="#4b3a16" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Memory</text><text x="1076" y="264" text-anchor="middle" fill="#786331" font-family="system-ui,sans-serif" font-size="12">retrieve</text>
</svg>
