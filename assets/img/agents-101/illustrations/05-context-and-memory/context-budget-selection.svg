<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc"><title id="title">A context budget selects evidence instead of accumulating text</title><desc id="desc">Candidate instructions, retrieval, memory, and tool observations are ranked by relevance, authority, freshness, and permission before entering the bounded context window.</desc><defs><style>.b{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.h{font:700 23px system-ui;fill:#24343a}.k{font:700 17px system-ui;letter-spacing:2px;fill:#276c77}.n{font:700 18px system-ui;fill:#24343a}.s{font:500 14px system-ui;fill:#52666b}.w{font:700 18px system-ui;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs><rect class="b" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">CONTEXT HAS A BUDGET</text><text class="h" x="100" y="143">Select the strongest evidence for this turn; do not let the window become an unranked archive.</text><rect class="p" x="110" y="220" width="220" height="72" rx="16"/><rect class="p" x="110" y="310" width="220" height="72" rx="16"/><rect class="p" x="110" y="400" width="220" height="72" rx="16"/><text class="n" x="220" y="264" text-anchor="middle">Instructions</text><text class="n" x="220" y="354" text-anchor="middle">Retrieval + memory</text><text class="n" x="220" y="444" text-anchor="middle">Tool observations</text><path d="M330 256H470" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><path d="M330 346H470" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><path d="M330 436H470" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><rect x="470" y="260" width="250" height="170" rx="24" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/><text class="n" x="595" y="310" text-anchor="middle">Rank + filter</text><text class="s" x="595" y="342" text-anchor="middle">relevance · authority</text><text class="s" x="595" y="367" text-anchor="middle">freshness · permission</text><path d="M720 345H840" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><rect x="840" y="270" width="230" height="150" rx="24" fill="#276c77"/><text class="w" x="955" y="325" text-anchor="middle">Context window</text><text x="955" y="355" text-anchor="middle" fill="#d7efed" font-family="system-ui" font-size="14">bounded working set</text></svg>
