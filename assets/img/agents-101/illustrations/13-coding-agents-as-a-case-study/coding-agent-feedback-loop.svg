<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Coding agents work through a verified feedback loop</title>
  <desc id="desc">A developer goal leads to repository context, an agent plan, file and tool actions, and tests or inspection. Passing evidence produces a patch; failure evidence returns the agent to planning with new information.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 18px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">CODING MAKES THE AGENT LOOP VISIBLE</text><text class="h" x="100" y="143">Repository feedback turns plans and edits into evidence-backed patches.</text>
  <path d="M260 326H326" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M496 326H562" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M732 326H798" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M968 326H1034" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/>
  <g><rect class="p" x="95" y="268" width="165" height="116" rx="18"/><text class="n" x="178" y="312" text-anchor="middle">Developer goal</text><text class="s" x="178" y="339" text-anchor="middle">task + constraints</text>
  <rect class="p" x="326" y="268" width="170" height="116" rx="18"/><text class="n" x="411" y="312" text-anchor="middle">Repo context</text><text class="s" x="411" y="339" text-anchor="middle">code + AGENTS.md</text>
  <rect x="562" y="268" width="170" height="116" rx="18" fill="#276c77" stroke="#174c55" stroke-width="2"/><text class="w" x="647" y="312" text-anchor="middle">Agent plan</text><text x="647" y="339" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">next useful step</text>
  <rect class="p" x="798" y="268" width="170" height="116" rx="18"/><text class="n" x="883" y="312" text-anchor="middle">Edit + tools</text><text class="s" x="883" y="339" text-anchor="middle">files · shell · browser</text>
  <rect x="1034" y="268" width="80" height="116" rx="18" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/><text class="n" x="1074" y="312" text-anchor="middle">Test</text><text class="s" x="1074" y="339" text-anchor="middle">evidence</text></g>
  <path d="M1114 326H1128V526H647V384" fill="none" stroke="#87989b" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#a)"/><text class="s" x="800" y="550" text-anchor="middle">failure, logs, and review findings improve the next plan</text>
  <path d="M1074 384V454" fill="none" stroke="#276c77" stroke-width="3" marker-end="url(#a)"/><rect x="920" y="454" width="190" height="54" rx="16" fill="#276c77"/><text x="1015" y="487" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Patch + explanation</text>
</svg>
