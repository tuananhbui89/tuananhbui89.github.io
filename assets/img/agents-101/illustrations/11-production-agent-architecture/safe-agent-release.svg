<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">A production agent change passes through evidence gates before and after release</title>
  <desc id="desc">A prompt or tool change moves through tool tests and offline evaluations, adversarial checks, shadow or canary exposure, and monitored staged rollout. A dashed feedback loop returns regressions or rollback signals to the change stage.</desc>
  <defs>
    <style>
      .bg{fill:#f7f7f4}.panel{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2.2px;fill:#276c77}.h{font:700 24px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.focus{font:700 18px system-ui,sans-serif;fill:#fff}.focuss{font:500 14px system-ui,sans-serif;fill:#d7efed}
    </style>
    <marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker>
    <marker id="loop" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#83aaa5"/></marker>
  </defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="panel" x="54" y="52" width="1092" height="536" rx="28"/>
  <text class="k" x="100" y="108">RELEASE IS A FEEDBACK LOOP</text><text class="h" x="100" y="145">Evidence gates earn broader production exposure.</text>
  <rect class="panel" x="86" y="250" width="180" height="126" rx="20"/><text class="n" x="176" y="295" text-anchor="middle">Build change</text><text class="s" x="176" y="324" text-anchor="middle">prompt, model, tool,</text><text class="s" x="176" y="347" text-anchor="middle">retrieval, or policy</text>
  <rect class="panel" x="302" y="250" width="180" height="126" rx="20"/><text class="n" x="392" y="295" text-anchor="middle">Validate</text><text class="s" x="392" y="324" text-anchor="middle">tool tests and</text><text class="s" x="392" y="347" text-anchor="middle">offline eval suite</text>
  <rect class="panel" x="518" y="250" width="180" height="126" rx="20"/><text class="n" x="608" y="295" text-anchor="middle">Challenge</text><text class="s" x="608" y="324" text-anchor="middle">red-team and</text><text class="s" x="608" y="347" text-anchor="middle">boundary cases</text>
  <rect class="panel" x="734" y="250" width="180" height="126" rx="20"/><text class="n" x="824" y="295" text-anchor="middle">Expose carefully</text><text class="s" x="824" y="324" text-anchor="middle">shadow traffic or</text><text class="s" x="824" y="347" text-anchor="middle">canary release</text>
  <rect x="950" y="232" width="160" height="162" rx="24" fill="#276c77"/><text class="focus" x="1030" y="284" text-anchor="middle">Monitor +</text><text class="focus" x="1030" y="307" text-anchor="middle">stage rollout</text><text class="focuss" x="1030" y="340" text-anchor="middle">traces, outcomes,</text><text class="focuss" x="1030" y="363" text-anchor="middle">regressions, cost</text>
  <path d="M266 313H302" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M482 313H518" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M698 313H734" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M914 313H950" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/>
  <path d="M1030 394V476H176V376" fill="none" stroke="#83aaa5" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#loop)"/><text class="s" x="603" y="506" text-anchor="middle">regression, incident, or rollback signal informs the next change</text>
</svg>
