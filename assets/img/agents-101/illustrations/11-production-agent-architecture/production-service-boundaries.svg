<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">A production agent is a service surrounded by operational boundaries</title>
  <desc id="desc">User requests enter an API gateway and agent service. The service coordinates state, tools, data retrieval, approvals, and observability so the model loop can run safely and repeatedly.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 19px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">A PRODUCTION AGENT IS A SERVICE</text><text class="h" x="100" y="143">The model loop lives inside infrastructure for identity, state, permissions, and evidence.</text>
  <path d="M246 326H330" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M505 326H598" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M790 326H865" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/>
  <g><rect class="p" x="94" y="270" width="152" height="112" rx="18"/><text class="n" x="170" y="314" text-anchor="middle">User / app</text><text class="s" x="170" y="341" text-anchor="middle">request + feedback</text>
  <rect class="p" x="330" y="270" width="175" height="112" rx="18"/><text class="n" x="418" y="314" text-anchor="middle">API gateway</text><text class="s" x="418" y="341" text-anchor="middle">identity + rate limits</text>
  <rect x="598" y="242" width="192" height="168" rx="22" fill="#276c77" stroke="#174c55" stroke-width="2"/><text class="w" x="694" y="302" text-anchor="middle">Agent service</text><text x="694" y="330" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">prompt assembly + loop</text><text x="694" y="354" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">retries + routing</text>
  <rect class="p" x="865" y="270" width="220" height="112" rx="18"/><text class="n" x="975" y="314" text-anchor="middle">Tool + data gateways</text><text class="s" x="975" y="341" text-anchor="middle">validated, permissioned calls</text></g>
  <path d="M650 410V473" fill="none" stroke="#83aaa5" stroke-width="3" marker-end="url(#a)"/><path d="M738 410C760 430 815 450 860 473" fill="none" stroke="#83aaa5" stroke-width="3" marker-end="url(#a)"/><path d="M620 410C560 430 500 450 475 500" fill="none" stroke="#83aaa5" stroke-width="3" marker-end="url(#a)"/>
  <g><rect x="555" y="473" width="190" height="54" rx="16" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/><text class="n" x="650" y="506" text-anchor="middle">State + artifacts</text><rect x="765" y="473" width="190" height="54" rx="16" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="860" y="506" text-anchor="middle">Approvals</text><rect x="270" y="473" width="205" height="54" rx="16" fill="#f0f3f3" stroke="#a9b6b7" stroke-width="2"/><text class="n" x="372" y="506" text-anchor="middle">Observability + evals</text></g>
</svg>
