<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc"><title id="title">Interruptions are control decisions, not lost work</title><desc id="desc">When a run is interrupted, the runtime persists state and evidence, then either resumes safely, waits for approval, retries with recovery information, or stops.</desc><defs><style>.b{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.h{font:700 23px system-ui;fill:#24343a}.k{font:700 17px system-ui;letter-spacing:2px;fill:#276c77}.n{font:700 18px system-ui;fill:#24343a}.s{font:500 14px system-ui;fill:#52666b}.w{font:700 18px system-ui;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs><rect class="b" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">INTERRUPTIONS PRESERVE CONTROL</text><text class="h" x="100" y="143">Persist enough evidence to resume safely—or make an explicit stop or escalation decision.</text><rect x="120" y="260" width="220" height="120" rx="22" fill="#276c77"/><text class="w" x="230" y="310" text-anchor="middle">Interrupted run</text><text x="230" y="340" text-anchor="middle" fill="#d7efed" font-family="system-ui" font-size="14">timeout · failure · approval</text><rect x="470" y="260" width="230" height="120" rx="22" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/><text class="n" x="585" y="310" text-anchor="middle">Persist checkpoint</text><text class="s" x="585" y="340" text-anchor="middle">state · trace · pending work</text><path d="M340 320H470" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M585 380V445" fill="none" stroke="#83aaa5" stroke-width="3" marker-end="url(#a)"/><rect class="p" x="360" y="445" width="150" height="62" rx="16"/><rect x="525" y="445" width="150" height="62" rx="16" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><rect class="p" x="690" y="445" width="150" height="62" rx="16"/><text class="n" x="435" y="483" text-anchor="middle">Resume</text><text class="n" x="600" y="483" text-anchor="middle">Approve</text><text class="n" x="765" y="483" text-anchor="middle">Stop</text></svg>
