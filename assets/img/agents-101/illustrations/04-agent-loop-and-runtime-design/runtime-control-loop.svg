<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">A runtime coordinates model proposals with control and evidence</title>
  <desc id="desc">A loop moves from goal and context to model proposal, allowed action, observation, and updated state. Guardrails can block or require approval, while evidence controls whether the next iteration continues or stops.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.inv{font:700 17px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">THE RUNTIME IS THE CONTROL SYSTEM</text><text class="h" x="100" y="143">The model proposes; the runtime validates, records, and decides whether work continues.</text>
  <path d="M276 327H340" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/><path d="M500 327H564" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/><path d="M724 327H788" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/><path d="M948 327H1002" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/>
  <g><rect class="p" x="116" y="270" width="160" height="114" rx="18"/><text class="n" x="196" y="313" text-anchor="middle">Goal + context</text><text class="s" x="196" y="341" text-anchor="middle">prepare input</text>
  <rect x="340" y="270" width="160" height="114" rx="18" fill="#276c77" stroke="#174c55" stroke-width="2"/><text class="inv" x="420" y="313" text-anchor="middle">Model</text><text x="420" y="341" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">proposes next step</text>
  <rect x="564" y="270" width="160" height="114" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="644" y="313" text-anchor="middle">Validate</text><text class="s" x="644" y="341" text-anchor="middle">policy + schema</text>
  <rect class="p" x="788" y="270" width="160" height="114" rx="18"/><text class="n" x="868" y="313" text-anchor="middle">Act + observe</text><text class="s" x="868" y="341" text-anchor="middle">tool result</text>
  <rect x="1002" y="270" width="116" height="114" rx="18" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/><text class="n" x="1060" y="313" text-anchor="middle">State</text><text class="s" x="1060" y="341" text-anchor="middle">evidence</text></g>
  <path d="M1060 384V520H196V384" fill="none" stroke="#477b7d" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#a)"/><text x="628" y="550" text-anchor="middle" fill="#477b7d" font-family="system-ui,sans-serif" font-size="15" font-weight="700">continue only while the task is unfinished and controls allow it</text>
  <path d="M644 384V438" fill="none" stroke="#b48931" stroke-width="3" marker-end="url(#a)"/><rect x="547" y="438" width="194" height="58" rx="16" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="644" y="463" text-anchor="middle">Approval or block</text><text class="s" x="644" y="484" text-anchor="middle">pause or stop safely</text>
</svg>
