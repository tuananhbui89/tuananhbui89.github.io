<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Choose orchestration from the work's uncertainty and coordination needs</title>
  <desc id="desc">A decision path keeps a single agent for narrow work, uses a workflow for a known path, uses a router or parallel workers for known specialization, and uses an orchestrator only when dynamic decomposition is needed.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.yes{font:700 14px system-ui,sans-serif;fill:#276c77}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">ORCHESTRATE ONLY WHEN IT EARNS ITS COST</text><text class="h" x="100" y="143">Choose the simplest coordination pattern that matches the task.</text>
  <rect x="480" y="192" width="240" height="70" rx="18" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/><text class="n" x="600" y="221" text-anchor="middle">Is the task narrow?</text><text class="s" x="600" y="245" text-anchor="middle">one owner, predictable tools</text>
  <path d="M480 227H290" fill="none" stroke="#4d747a" stroke-width="3" stroke-linecap="round" marker-end="url(#a)"/><path d="M720 227H910" fill="none" stroke="#4d747a" stroke-width="3" stroke-linecap="round" marker-end="url(#a)"/><path d="M600 262V340" fill="none" stroke="#4d747a" stroke-width="3" stroke-linecap="round" marker-end="url(#a)"/><text class="yes" x="380" y="213">yes</text><text class="yes" x="803" y="213">no</text>
  <rect class="p" x="100" y="192" width="190" height="70" rx="18"/><text class="n" x="195" y="221" text-anchor="middle">Single agent</text><text class="s" x="195" y="245" text-anchor="middle">start here</text>
  <rect x="910" y="192" width="190" height="70" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="1005" y="221" text-anchor="middle">Known route?</text><text class="s" x="1005" y="245" text-anchor="middle">fixed decision logic</text>
  <path d="M910 227C800 227 700 280 610 340" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><path d="M1005 262C1005 290 970 315 923 340" fill="none" stroke="#4d747a" stroke-width="3" marker-end="url(#a)"/><text class="yes" x="760" y="260">yes</text><text class="yes" x="1020" y="306">no</text>
  <rect class="p" x="460" y="340" width="190" height="70" rx="18"/><text class="n" x="555" y="369" text-anchor="middle">Workflow / router</text><text class="s" x="555" y="393" text-anchor="middle">known specialization</text>
  <rect x="828" y="340" width="190" height="70" rx="18" fill="#276c77" stroke="#174c55" stroke-width="2"/><text x="923" y="369" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Orchestrator</text><text x="923" y="393" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">dynamic decomposition</text>
  <rect x="285" y="470" width="630" height="48" rx="16" fill="#f0f3f3" stroke="#a9b6b7" stroke-width="2"/><text class="s" x="600" y="501" text-anchor="middle">Use parallel workers only for independent work; use handoffs when the user should talk to a specialist.</text>
</svg>
