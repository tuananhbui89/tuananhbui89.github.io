<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc"><title id="title">A handoff transfers responsibility with a clear boundary contract</title><desc id="desc">A coordinator transfers a task to a specialist with goals, relevant context, permissions, and success criteria. The specialist returns a structured result and evidence rather than hidden state.</desc><defs><style>.b{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.h{font:700 23px system-ui;fill:#24343a}.k{font:700 17px system-ui;letter-spacing:2px;fill:#276c77}.n{font:700 18px system-ui;fill:#24343a}.s{font:500 14px system-ui;fill:#52666b}.w{font:700 18px system-ui;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs><rect class="b" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">HANDOFFS NEED BOUNDARIES</text><text class="h" x="100" y="143">Pass the specialist the task contract it needs—not an opaque pile of hidden coordinator state.</text><rect x="120" y="250" width="220" height="140" rx="22" fill="#276c77"/><text class="w" x="230" y="305" text-anchor="middle">Coordinator</text><text x="230" y="336" text-anchor="middle" fill="#d7efed" font-family="system-ui" font-size="14">owns conversation + routing</text><path d="M340 320H470" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><rect x="470" y="218" width="260" height="204" rx="24" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/><text class="n" x="600" y="267" text-anchor="middle">Handoff contract</text><text class="s" x="600" y="304" text-anchor="middle">goal · context · permissions</text><text class="s" x="600" y="332" text-anchor="middle">success criteria · stop rules</text><path d="M730 320H850" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><rect class="p" x="850" y="250" width="220" height="140" rx="22"/><text class="n" x="960" y="305" text-anchor="middle">Specialist</text><text class="s" x="960" y="336" text-anchor="middle">returns result + evidence</text></svg>
