<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Four data planes make enterprise answers useful and defensible</title>
  <desc id="desc">Source, index, access, and evidence planes each contribute to a grounded agent answer. A gap in any plane causes missing knowledge, poor retrieval, data leakage, or unsupported claims.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.n{font:700 19px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 16px system-ui,sans-serif;fill:#fff}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">ENTERPRISE DATA IS MORE THAN SEARCH</text><text class="h" x="100" y="143">A grounded answer needs connected source, index, access, and evidence planes.</text>
  <path d="M320 333H385" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/><path d="M555 333H620" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/><path d="M790 333H855" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round" marker-end="url(#a)"/>
  <g><rect class="p" x="100" y="240" width="220" height="186" rx="22"/><text class="n" x="130" y="284">1. Source plane</text><text class="s" x="130" y="318">systems of record</text><text class="s" x="130" y="343">documents · SQL · CRM</text><rect x="130" y="370" width="130" height="29" rx="14" fill="#edf2f1"/><text x="195" y="390" text-anchor="middle" fill="#276c77" font-family="system-ui,sans-serif" font-size="13" font-weight="700">what exists</text>
  <rect x="385" y="240" width="170" height="186" rx="22" fill="#edf7f5" stroke="#77aaa5" stroke-width="2"/><text class="n" x="470" y="284" text-anchor="middle">2. Index</text><text class="s" x="470" y="318" text-anchor="middle">chunks + metadata</text><text class="s" x="470" y="343" text-anchor="middle">embeddings + rank</text><rect x="406" y="370" width="128" height="29" rx="14" fill="#e4f1f2"/><text x="470" y="390" text-anchor="middle" fill="#276c77" font-family="system-ui,sans-serif" font-size="13" font-weight="700">what is found</text>
  <rect x="620" y="240" width="170" height="186" rx="22" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="705" y="284" text-anchor="middle">3. Access</text><text class="s" x="705" y="318" text-anchor="middle">identity + ACLs</text><text class="s" x="705" y="343" text-anchor="middle">tenant boundary</text><rect x="641" y="370" width="128" height="29" rx="14" fill="#fff0c9"/><text x="705" y="390" text-anchor="middle" fill="#7d5b15" font-family="system-ui,sans-serif" font-size="13" font-weight="700">what is allowed</text>
  <rect x="855" y="240" width="245" height="186" rx="22" fill="#276c77" stroke="#174c55" stroke-width="2"/><text x="885" y="284" fill="#fff" font-family="system-ui,sans-serif" font-size="19" font-weight="700">4. Evidence</text><text x="885" y="318" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">snippets · citations · freshness</text><text x="885" y="343" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">confidence for the model</text><text x="885" y="363" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">and the user</text><rect x="885" y="382" width="160" height="29" rx="14" fill="#dceeed"/><text x="965" y="402" text-anchor="middle" fill="#276c77" font-family="system-ui,sans-serif" font-size="13" font-weight="700">what can be proved</text></g>
  <rect x="280" y="478" width="640" height="46" rx="15" fill="#f0f3f3" stroke="#a9b6b7" stroke-width="2"/><text class="s" x="600" y="507" text-anchor="middle">Search without access leaks data; ranking without evidence creates unsupported answers.</text>
</svg>
