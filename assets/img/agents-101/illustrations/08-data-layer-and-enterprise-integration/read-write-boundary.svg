<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise read access and write access are separate control paths</title>
  <desc id="desc">Source data passes through permissioned retrieval to an evidence packet and then an agent proposal. A separate write path validates the proposed action, checks policy and approval, uses an idempotency key, records the external effect, and emits an audit and recovery record. A note states that read permission does not imply write permission.</desc>
  <defs>
    <style>
      .bg{fill:#f7f7f4}.panel{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2.2px;fill:#276c77}.h{font:700 24px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 19px system-ui,sans-serif;fill:#fff}.ws{font:500 14px system-ui,sans-serif;fill:#d7efed}.gate{font:700 16px system-ui,sans-serif;fill:#765c20}
    </style>
    <marker id="read" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker>
    <marker id="write" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#d3a94a"/></marker>
    <marker id="audit" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#83aaa5"/></marker>
  </defs>
  <rect class="bg" width="1200" height="660" rx="28"/><rect class="panel" x="54" y="52" width="1092" height="556" rx="28"/>
  <text class="k" x="100" y="108">ENTERPRISE READ–WRITE BOUNDARY</text><text class="h" x="100" y="145">Grounded reads support a proposal; a separate gated path creates any external effect.</text>
  <rect class="panel" x="88" y="216" width="180" height="112" rx="20"/><text class="n" x="178" y="258" text-anchor="middle">Source data</text><text class="s" x="178" y="286" text-anchor="middle">docs, records,</text><text class="s" x="178" y="308" text-anchor="middle">systems of record</text>
  <rect class="panel" x="340" y="216" width="200" height="112" rx="20"/><text class="n" x="440" y="258" text-anchor="middle">Permissioned</text><text class="n" x="440" y="280" text-anchor="middle">retrieval</text><text class="s" x="440" y="308" text-anchor="middle">ACLs, ranking, freshness</text>
  <rect class="panel" x="612" y="216" width="190" height="112" rx="20"/><text class="n" x="707" y="258" text-anchor="middle">Evidence packet</text><text class="s" x="707" y="286" text-anchor="middle">claims, citations,</text><text class="s" x="707" y="308" text-anchor="middle">authority, timestamps</text>
  <rect x="874" y="198" width="225" height="148" rx="24" fill="#276c77"/><text class="w" x="986" y="251" text-anchor="middle">Agent proposal</text><text class="ws" x="986" y="282" text-anchor="middle">explain, draft, or request</text><text class="ws" x="986" y="306" text-anchor="middle">a bounded write action</text>
  <path d="M268 272H340" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#read)"/><path d="M540 272H612" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#read)"/><path d="M802 272H874" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#read)"/>
  <text class="s" x="304" y="252" text-anchor="middle">read</text><text class="s" x="576" y="252" text-anchor="middle">ground</text><text class="s" x="838" y="252" text-anchor="middle">inform</text>
  <rect x="112" y="454" width="214" height="74" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="gate" x="219" y="483" text-anchor="middle">Validate action</text><text class="s" x="219" y="508" text-anchor="middle">scope, schema, ownership</text>
  <rect x="400" y="454" width="214" height="74" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="gate" x="507" y="483" text-anchor="middle">Policy + approval</text><text class="s" x="507" y="508" text-anchor="middle">allow, pause, or deny</text>
  <rect x="688" y="454" width="214" height="74" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="gate" x="795" y="483" text-anchor="middle">Idempotent write</text><text class="s" x="795" y="508" text-anchor="middle">one bounded external effect</text>
  <rect x="976" y="454" width="124" height="74" rx="18" fill="#fff" stroke="#c4d5d2" stroke-width="2"/><text class="n" x="1038" y="483" text-anchor="middle">Record</text><text class="s" x="1038" y="508" text-anchor="middle">effect</text>
  <path d="M986 346V401H219V454" fill="none" stroke="#d3a94a" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#write)"/><path d="M326 491H400" fill="none" stroke="#d3a94a" stroke-width="4" marker-end="url(#write)"/><path d="M614 491H688" fill="none" stroke="#d3a94a" stroke-width="4" marker-end="url(#write)"/><path d="M902 491H976" fill="none" stroke="#d3a94a" stroke-width="4" marker-end="url(#write)"/><text class="s" x="630" y="421" text-anchor="middle">write request</text>
  <path d="M1038 528V562H862" fill="none" stroke="#83aaa5" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#audit)"/><text class="s" x="950" y="584" text-anchor="middle">audit, compensation, or rollback plan</text>
  <text x="600" y="392" text-anchor="middle" fill="#765c20" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Read permission does not imply write permission.</text>
</svg>
