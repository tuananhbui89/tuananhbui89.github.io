<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Agentic UX gives the user a control cockpit</title>
  <desc id="desc">A user-facing task sits at the centre of an agentic interface. Five surrounding jobs orient the user, reveal progress, enable control, support recovery, and provide evidence for trust.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.n{font:700 19px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 21px system-ui,sans-serif;fill:#fff}</style></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">THE UX IS PART OF THE CONTROL SYSTEM</text><text class="h" x="100" y="143">Show the work that helps a person understand, steer, approve, and trust the agent.</text>
  <circle cx="600" cy="347" r="132" fill="#dceeed"/><circle cx="600" cy="347" r="103" fill="#276c77" stroke="#174c55" stroke-width="3"/><text class="w" x="600" y="337" text-anchor="middle">User task</text><text x="600" y="367" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="15">agent work made legible</text>
  <g><rect class="p" x="470" y="190" width="260" height="70" rx="18"/><text class="n" x="600" y="220" text-anchor="middle">Orient</text><text class="s" x="600" y="244" text-anchor="middle">What is it trying to do?</text>
  <rect class="p" x="820" y="268" width="230" height="70" rx="18"/><text class="n" x="935" y="298" text-anchor="middle">Reveal</text><text class="s" x="935" y="322" text-anchor="middle">What changed or was found?</text>
  <rect x="788" y="420" width="260" height="70" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="918" y="450" text-anchor="middle">Control</text><text class="s" x="918" y="474" text-anchor="middle">Approve, edit, stop, redirect</text>
  <rect class="p" x="152" y="420" width="260" height="70" rx="18"/><text class="n" x="282" y="450" text-anchor="middle">Recover</text><text class="s" x="282" y="474" text-anchor="middle">What failed? What next?</text>
  <rect class="p" x="150" y="268" width="230" height="70" rx="18"/><text class="n" x="265" y="298" text-anchor="middle">Trust</text><text class="s" x="265" y="322" text-anchor="middle">Why believe the result?</text></g>
  <path d="M600 244V260M703 347H820M689 398L788 455M511 398L412 455M497 347H380" fill="none" stroke="#83aaa5" stroke-width="3" stroke-linecap="round"/>
</svg>
