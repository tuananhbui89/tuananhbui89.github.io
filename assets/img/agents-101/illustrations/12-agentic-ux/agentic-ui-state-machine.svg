<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">An agentic interface mirrors runtime state and makes pauses actionable</title>
  <desc id="desc">A normal flow moves from idle to planning to running and then completed. While running, the interface can enter actionable pause states for clarification, approval, or artifact editing, then resume. The diagram emphasizes that UI state must match runtime state.</desc>
  <defs>
    <style>
      .bg{fill:#f7f7f4}.panel{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2.2px;fill:#276c77}.h{font:700 24px system-ui,sans-serif;fill:#24343a}.n{font:700 18px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 21px system-ui,sans-serif;fill:#fff}.ws{font:500 14px system-ui,sans-serif;fill:#d7efed}.gold{font:700 15px system-ui,sans-serif;fill:#765c20}.red{font:700 15px system-ui,sans-serif;fill:#9a4646}
    </style>
    <marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker>
    <marker id="pause" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#d3a94a"/></marker>
    <marker id="resume" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#83aaa5"/></marker>
  </defs>
  <rect class="bg" width="1200" height="680" rx="28"/><rect class="panel" x="54" y="52" width="1092" height="576" rx="28"/>
  <text class="k" x="100" y="108">AGENTIC UI STATE MODEL</text><text class="h" x="100" y="145">Trust grows when the interface reflects the runtime and makes every pause a clear choice.</text>
  <rect class="panel" x="90" y="242" width="150" height="94" rx="18"/><text class="n" x="165" y="282" text-anchor="middle">Idle</text><text class="s" x="165" y="308" text-anchor="middle">ready for task</text>
  <rect class="panel" x="304" y="242" width="150" height="94" rx="18"/><text class="n" x="379" y="282" text-anchor="middle">Planning</text><text class="s" x="379" y="308" text-anchor="middle">show a short plan</text>
  <rect x="518" y="216" width="226" height="146" rx="24" fill="#276c77"/><text class="w" x="631" y="272" text-anchor="middle">Running</text><text class="ws" x="631" y="302" text-anchor="middle">event-based progress</text><text class="ws" x="631" y="326" text-anchor="middle">and live evidence</text>
  <rect class="panel" x="890" y="242" width="200" height="94" rx="18"/><text class="n" x="990" y="282" text-anchor="middle">Completed</text><text class="s" x="990" y="308" text-anchor="middle">result, artifacts, evidence</text>
  <path d="M240 289H304" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M454 289H518" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/><path d="M744 289H890" fill="none" stroke="#4d747a" stroke-width="4" marker-end="url(#a)"/>
  <text class="s" x="272" y="269" text-anchor="middle">start</text><text class="s" x="486" y="269" text-anchor="middle">begin</text><text class="s" x="817" y="269" text-anchor="middle">evidence proves done</text>
  <rect x="167" y="460" width="218" height="78" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="gold" x="276" y="490" text-anchor="middle">Clarification pause</text><text class="s" x="276" y="516" text-anchor="middle">ask a concrete question</text>
  <rect x="491" y="460" width="218" height="78" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="gold" x="600" y="490" text-anchor="middle">Approval pause</text><text class="s" x="600" y="516" text-anchor="middle">show exact action and risk</text>
  <rect x="815" y="460" width="218" height="78" rx="18" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="gold" x="924" y="490" text-anchor="middle">Artifact editing</text><text class="s" x="924" y="516" text-anchor="middle">diff, revise, or reject</text>
  <path d="M569 362V410H276V460" fill="none" stroke="#d3a94a" stroke-width="3" marker-end="url(#pause)"/><path d="M631 362V460" fill="none" stroke="#d3a94a" stroke-width="3" marker-end="url(#pause)"/><path d="M693 362V410H924V460" fill="none" stroke="#d3a94a" stroke-width="3" marker-end="url(#pause)"/>
  <path d="M276 460V420H550V362" fill="none" stroke="#83aaa5" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#resume)"/><path d="M600 460V420H612V362" fill="none" stroke="#83aaa5" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#resume)"/><path d="M924 460V420H712V362" fill="none" stroke="#83aaa5" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#resume)"/><text class="s" x="631" y="584" text-anchor="middle">resolved pauses resume the same inspectable run</text>
</svg>
