<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
<title id="title">Tool permissions should rise with consequence</title><desc id="desc">Read-only actions can run automatically, staged changes need review, and irreversible external effects require explicit human approval and an audit trail.</desc>
<defs><style>.b{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.h{font:700 23px system-ui;fill:#24343a}.k{font:700 17px system-ui;letter-spacing:2px;fill:#276c77}.n{font:700 18px system-ui;fill:#24343a}.s{font:500 14px system-ui;fill:#52666b}</style></defs>
<rect class="b" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">PERMISSIONS FOLLOW CONSEQUENCE</text><text class="h" x="100" y="143">Make higher-impact actions progressively harder to execute without evidence and review.</text>
<rect x="130" y="392" width="250" height="78" rx="20" fill="#e4f1f2" stroke="#77aaa5" stroke-width="2"/><rect x="475" y="304" width="250" height="166" rx="20" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><rect x="820" y="216" width="250" height="254" rx="20" fill="#276c77"/>
<text class="n" x="255" y="430" text-anchor="middle">Read</text><text class="s" x="255" y="454" text-anchor="middle">automatic + logged</text><text class="n" x="600" y="354" text-anchor="middle">Stage</text><text class="s" x="600" y="380" text-anchor="middle">reversible change</text><text class="s" x="600" y="408" text-anchor="middle">review before commit</text><text x="945" y="286" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="19" font-weight="700">External effect</text><text x="945" y="320" text-anchor="middle" fill="#d7efed" font-family="system-ui" font-size="14">approval + audit</text><text x="945" y="348" text-anchor="middle" fill="#d7efed" font-family="system-ui" font-size="14">irreversible or sensitive</text>
</svg>
