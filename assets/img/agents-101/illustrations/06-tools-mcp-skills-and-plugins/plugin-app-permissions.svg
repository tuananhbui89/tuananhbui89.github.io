<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Plugin packaging and app permission boundaries</title>
  <desc id="desc">A plugin package contains skills, apps, and app templates. An included app passes through workspace access and action controls before it reaches source-system permissions, showing that a plugin does not grant access by itself.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 11 12" refX="11" refY="6" markerWidth="11" markerHeight="12" markerUnits="userSpaceOnUse" orient="auto"><path d="M0,0 L11,6 L0,12 Z" fill="#347a80"/></marker>
    <pattern id="grain" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M0 28 L28 0" stroke="#e1eeee" stroke-width="1"/></pattern>
  </defs>
  <rect x="12" y="12" width="1176" height="676" rx="26" fill="#fbfcfa" stroke="#d8ddd7" stroke-width="2"/>
  <rect x="48" y="48" width="1104" height="98" rx="18" fill="url(#grain)"/>
  <text x="80" y="85" fill="#27717a" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="2.3">PLUGIN BOUNDARIES</text>
  <text x="80" y="119" fill="#223038" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">A plugin packages a workflow; app and source controls still decide access.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="440" y="175" width="320" height="91" rx="20" fill="#1e5d66"/>
    <text x="600" y="213" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">Plugin</text>
    <text x="600" y="240" text-anchor="middle" fill="#d8eeee" font-size="14">package a repeatable workflow</text>

    <rect x="75" y="340" width="260" height="118" rx="18" fill="#f3f7f6" stroke="#8fb7b8" stroke-width="2"/>
    <text x="101" y="379" fill="#223038" font-size="18" font-weight="700">Skills</text>
    <text x="101" y="407" fill="#60727b" font-size="14">instructions · prompts</text>
    <text x="101" y="431" fill="#60727b" font-size="14">workflow patterns</text>

    <rect x="470" y="340" width="260" height="118" rx="18" fill="#e5f1f1" stroke="#4d8b8e" stroke-width="2.5"/>
    <text x="496" y="379" fill="#223038" font-size="18" font-weight="700">Apps</text>
    <text x="496" y="407" fill="#426e73" font-size="14">external systems · data</text>
    <text x="496" y="431" fill="#426e73" font-size="14">searches and actions</text>

    <rect x="865" y="340" width="260" height="118" rx="18" fill="#fff8e7" stroke="#c59a4b" stroke-width="2"/>
    <text x="891" y="379" fill="#223038" font-size="18" font-weight="700">App templates</text>
    <text x="891" y="407" fill="#78613a" font-size="14">admin configuration</text>
    <text x="891" y="431" fill="#78613a" font-size="14">before an app is usable</text>

    <rect x="470" y="530" width="260" height="70" rx="16" fill="#fff8e7" stroke="#c59a4b" stroke-width="2"/>
    <text x="600" y="559" text-anchor="middle" fill="#5e4b27" font-size="16" font-weight="700">Workspace + app controls</text>
    <text x="600" y="582" text-anchor="middle" fill="#78613a" font-size="13">role access · actions · approvals · sync</text>

    <rect x="770" y="530" width="355" height="70" rx="16" fill="#fff" stroke="#8fb7b8" stroke-width="2"/>
    <text x="947" y="559" text-anchor="middle" fill="#223038" font-size="16" font-weight="700">Source-system permissions</text>
    <text x="947" y="582" text-anchor="middle" fill="#60727b" font-size="13">OAuth and the connected system still apply</text>
  </g>

  <g fill="none" stroke="#347a80" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M514 266 L256 340"/>
    <path d="M600 266 V340"/>
    <path d="M686 266 L944 340"/>
    <path d="M600 458 V530" stroke-dasharray="7 7"/>
    <path d="M730 565 H770" stroke-dasharray="7 7"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4e6970" font-weight="700">
    <text x="382" y="294" text-anchor="middle">includes</text>
    <text x="600" y="303" text-anchor="middle">includes</text>
    <text x="818" y="294" text-anchor="middle">may include</text>
    <text x="614" y="504">governed by</text>
    <text x="750" y="549" text-anchor="middle">does not bypass</text>
  </g>
  <rect x="75" y="530" width="335" height="70" rx="16" fill="#f3f7f6" stroke="#8fb7b8" stroke-width="2"/>
  <text x="243" y="559" text-anchor="middle" fill="#2f676e" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Plugin package ≠ permission grant</text>
  <text x="243" y="582" text-anchor="middle" fill="#60727b" font-family="Arial, Helvetica, sans-serif" font-size="13">review capability and its dependencies</text>
  <circle cx="84" cy="656" r="5" fill="#27717a"/>
  <text x="99" y="661" fill="#5f6f7a" font-family="Arial, Helvetica, sans-serif" font-size="14">Packaging, workspace policy, app controls, and source authorization are separate layers.</text>
</svg>
