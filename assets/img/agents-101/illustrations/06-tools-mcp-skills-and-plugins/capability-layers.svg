<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Tools, MCP servers, skills, and plugins occupy different capability layers</title>
  <desc id="desc">A tool is a callable capability. An MCP server standardizes tools and resources. A skill holds reusable task instructions. A plugin packages combinations of skills, MCP servers, apps, and other assets.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.n{font:700 20px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.tag{font:700 13px system-ui,sans-serif;fill:#276c77}</style></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">CAPABILITY LAYERS</text><text class="h" x="100" y="143">Name the layer before deciding how the agent should discover, call, or package it.</text>
  <g><rect class="p" x="100" y="222" width="220" height="232" rx="22"/><text class="n" x="130" y="270">Tool</text><text class="s" x="130" y="305">A callable capability.</text><rect x="130" y="335" width="160" height="44" rx="13" fill="#e4f1f2"/><text class="tag" x="210" y="362" text-anchor="middle">search · query · act</text><text class="s" x="130" y="414">Smallest action surface.</text>
  <rect x="355" y="202" width="220" height="272" rx="22" fill="#edf7f5" stroke="#77aaa5" stroke-width="2"/><text class="n" x="385" y="250">MCP server</text><text class="s" x="385" y="282">A standardized provider.</text><rect class="p" x="385" y="314" width="160" height="40" rx="12"/><text class="tag" x="465" y="339" text-anchor="middle">tools</text><rect class="p" x="385" y="364" width="160" height="40" rx="12"/><text class="tag" x="465" y="389" text-anchor="middle">resources + prompts</text><text class="s" x="385" y="438">Connects hosts to systems.</text>
  <rect class="p" x="610" y="222" width="220" height="232" rx="22"/><text class="n" x="640" y="270">Skill</text><text class="s" x="640" y="305">Reusable task knowledge.</text><rect x="640" y="335" width="160" height="44" rx="13" fill="#fff8df"/><text x="720" y="362" text-anchor="middle" fill="#7d5b15" font-family="system-ui,sans-serif" font-size="13" font-weight="700">instructions + workflow</text><text class="s" x="640" y="414">Teaches how to do work.</text>
  <rect x="865" y="184" width="235" height="310" rx="24" fill="#276c77" stroke="#174c55" stroke-width="2"/><text x="895" y="233" fill="#fff" font-family="system-ui,sans-serif" font-size="21" font-weight="750">Plugin</text><text x="895" y="264" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">A packaged extension.</text><rect x="895" y="300" width="175" height="38" rx="12" fill="#dceeed"/><text class="tag" x="982" y="324" text-anchor="middle">skills</text><rect x="895" y="348" width="175" height="38" rx="12" fill="#dceeed"/><text class="tag" x="982" y="372" text-anchor="middle">MCP servers</text><rect x="895" y="396" width="175" height="38" rx="12" fill="#dceeed"/><text class="tag" x="982" y="420" text-anchor="middle">apps + assets</text><text x="895" y="466" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">Bundles related capabilities.</text></g>
</svg>
