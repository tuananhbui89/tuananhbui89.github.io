<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Codex App as a command center for agent work</title>
  <desc id="desc">A diagram shows project threads flowing into the Codex App command center and then to a review queue. Skills and automations feed the command center from below as reusable workflow guidance and scheduled work.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 11 12" refX="11" refY="6" markerWidth="11" markerHeight="12" markerUnits="userSpaceOnUse" orient="auto"><path d="M0,0 L11,6 L0,12 Z" fill="#347a80"/></marker>
    <pattern id="grain" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M0 28 L28 0" stroke="#e1eeee" stroke-width="1"/></pattern>
  </defs>
  <rect x="12" y="12" width="1176" height="676" rx="26" fill="#fbfcfa" stroke="#d8ddd7" stroke-width="2"/>
  <rect x="48" y="48" width="1104" height="98" rx="18" fill="url(#grain)"/>
  <text x="80" y="85" fill="#27717a" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="2.3">CODEX APP</text>
  <text x="80" y="119" fill="#223038" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">A command center connects parallel agent work to human review.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="80" y="220" width="220" height="154" rx="18" fill="#fff" stroke="#8fb7b8" stroke-width="2"/>
    <text x="104" y="255" fill="#223038" font-size="18" font-weight="700">Project threads</text>
    <rect x="104" y="277" width="82" height="29" rx="14" fill="#e5f1f1"/><text x="145" y="297" text-anchor="middle" fill="#31666c" font-size="13" font-weight="700">Agent A</text>
    <rect x="195" y="277" width="82" height="29" rx="14" fill="#e5f1f1"/><text x="236" y="297" text-anchor="middle" fill="#31666c" font-size="13" font-weight="700">Agent B</text>
    <rect x="104" y="318" width="82" height="29" rx="14" fill="#e5f1f1"/><text x="145" y="338" text-anchor="middle" fill="#31666c" font-size="13" font-weight="700">Agent C</text>
    <text x="104" y="362" fill="#60727b" font-size="13">isolated worktrees</text>

    <rect x="400" y="190" width="400" height="185" rx="24" fill="#1e5d66"/>
    <rect x="418" y="208" width="364" height="149" rx="18" fill="none" stroke="#8cc8c8" stroke-width="1.5" stroke-dasharray="5 7"/>
    <text x="600" y="253" text-anchor="middle" fill="#fff" font-size="25" font-weight="700">Codex App</text>
    <text x="600" y="284" text-anchor="middle" fill="#d8eeee" font-size="16">direct · supervise · collaborate</text>
    <text x="600" y="319" text-anchor="middle" fill="#d8eeee" font-size="14">parallel threads, shared project context</text>

    <rect x="900" y="220" width="220" height="154" rx="18" fill="#fff" stroke="#8fb7b8" stroke-width="2"/>
    <text x="924" y="255" fill="#223038" font-size="18" font-weight="700">Review queue</text>
    <path d="M925 282 h24 l10 10 h78" fill="none" stroke="#5c8d92" stroke-width="2"/>
    <path d="M925 315 h24 l10 10 h107" fill="none" stroke="#5c8d92" stroke-width="2"/>
    <text x="924" y="362" fill="#60727b" font-size="13">changes and results</text>

    <rect x="365" y="510" width="245" height="116" rx="18" fill="#f3f7f6" stroke="#8fb7b8" stroke-width="2"/>
    <text x="390" y="548" fill="#223038" font-size="18" font-weight="700">Skills</text>
    <text x="390" y="575" fill="#60727b" font-size="14">instructions · resources · scripts</text>
    <text x="390" y="601" fill="#60727b" font-size="14">reusable workflow guidance</text>

    <rect x="660" y="510" width="245" height="116" rx="18" fill="#fff8e7" stroke="#c59a4b" stroke-width="2"/>
    <text x="685" y="548" fill="#223038" font-size="18" font-weight="700">Automations</text>
    <text x="685" y="575" fill="#78613a" font-size="14">scheduled instruction + skills</text>
    <text x="685" y="601" fill="#78613a" font-size="14">results return for review</text>
  </g>

  <g fill="none" stroke="#347a80" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M300 297 H400"/>
    <path d="M800 297 H900"/>
    <path d="M487 510 V375" stroke-dasharray="7 7"/>
    <path d="M782 510 V375" stroke-dasharray="7 7"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4e6970" font-weight="700">
    <text x="347" y="281" text-anchor="middle">delegate</text>
    <text x="850" y="281" text-anchor="middle">inspect</text>
    <text x="478" y="449" text-anchor="end">guide</text>
    <text x="791" y="449">schedule</text>
  </g>
  <circle cx="84" cy="656" r="5" fill="#27717a"/>
  <text x="99" y="661" fill="#5f6f7a" font-family="Arial, Helvetica, sans-serif" font-size="14">The app makes supervision a first-class part of using multiple agents.</text>
</svg>
