<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Standards define different boundaries in the agent ecosystem</title>
  <desc id="desc">An agent runtime connects to tool and data systems through MCP, to peer agents through A2A, to telemetry through OpenTelemetry-style conventions, and to safety and governance frameworks through controls such as OWASP and NIST AI RMF.</desc>
  <defs><style>.bg{fill:#f7f7f4}.p{fill:#fff;stroke:#c4d5d2;stroke-width:2}.k{font:700 17px system-ui,sans-serif;letter-spacing:2px;fill:#276c77}.h{font:700 23px system-ui,sans-serif;fill:#24343a}.n{font:700 19px system-ui,sans-serif;fill:#24343a}.s{font:500 14px system-ui,sans-serif;fill:#52666b}.w{font:700 20px system-ui,sans-serif;fill:#fff}.tag{font:700 14px system-ui,sans-serif;fill:#276c77}</style><marker id="a" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 1L11 6L0 11z" fill="#4d747a"/></marker></defs>
  <rect class="bg" width="1200" height="640" rx="28"/><rect class="p" x="54" y="52" width="1092" height="516" rx="28"/><text class="k" x="100" y="108">STANDARDS ARE BOUNDARY AGREEMENTS</text><text class="h" x="100" y="143">Different standards solve different interoperability, evidence, and governance problems.</text>
  <rect x="480" y="266" width="240" height="130" rx="24" fill="#276c77" stroke="#174c55" stroke-width="2"/><text class="w" x="600" y="316" text-anchor="middle">Agent runtime</text><text x="600" y="346" text-anchor="middle" fill="#d7efed" font-family="system-ui,sans-serif" font-size="14">tools · state · loop · approvals</text>
  <path d="M480 331H350M720 331H850M600 266V240M600 396V472" fill="none" stroke="#4d747a" stroke-width="4" stroke-linecap="round"/>
  <g><rect class="p" x="100" y="264" width="250" height="134" rx="22"/><text class="n" x="225" y="309" text-anchor="middle">Tool + data systems</text><rect x="174" y="329" width="102" height="32" rx="14" fill="#e4f1f2"/><text class="tag" x="225" y="350" text-anchor="middle">MCP</text><text class="s" x="225" y="382" text-anchor="middle">agent-to-capability boundary</text>
  <rect class="p" x="850" y="264" width="250" height="134" rx="22"/><text class="n" x="975" y="309" text-anchor="middle">Peer agent</text><rect x="924" y="329" width="102" height="32" rx="14" fill="#e4f1f2"/><text class="tag" x="975" y="350" text-anchor="middle">A2A</text><text class="s" x="975" y="382" text-anchor="middle">agent-to-agent boundary</text>
  <rect x="425" y="170" width="350" height="70" rx="20" fill="#f0f3f3" stroke="#a9b6b7" stroke-width="2"/><text class="n" x="600" y="200" text-anchor="middle">Runs and services</text><text class="s" x="600" y="224" text-anchor="middle">OpenTelemetry-style traces, metrics, and logs</text>
  <rect x="383" y="472" width="434" height="68" rx="20" fill="#fff8df" stroke="#d3a94a" stroke-width="2"/><text class="n" x="600" y="501" text-anchor="middle">Safety + governance</text><text class="s" x="600" y="525" text-anchor="middle">OWASP risk classes · NIST AI RMF lifecycle controls</text></g>
</svg>
